<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Pagos · VetCare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.12.4/dist/sweetalert2.min.css" rel="stylesheet">
  <link href="/css/global.css" rel="stylesheet">
  
  <style>
        :root {
      --sidebar-bg: linear-gradient(180deg, #84cddb, #b4dadf);
      --sidebar-hover: rgba(255, 255, 255, 0.15);
      --sidebar-active: linear-gradient(135deg, #4facfe, #00f2fe);
      --text-color: #ffffff;
    }
  
    /* Sidebar */
    .sidebar {
      position: fixed;
      inset-block: 0;
      inset-inline-start: 0;
      width: 260px;
      background: var(--sidebar-bg);
      color: var(--text-color);
      z-index: 1030;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      border-right: 3px solid rgba(255,255,255,0.1);
    }
  
    /* Logo */
    .brand-logo {
      width: 90%;
      border-radius: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      transition: transform .3s ease;
    }
    .brand-logo:hover {
      transform: scale(1.05);
    }
  
    /* Menú */
    .sidebar .nav-link {
      color: var(--text-color);
      border-radius: .6rem;
      padding: .65rem 1rem;
      display: flex;
      align-items: center;
      gap: .6rem;
      transition: all .2s;
      font-weight: 500;
    }
  
    .sidebar .nav-link:hover {
      background: var(--sidebar-hover);
    }
  
    .sidebar .nav-link.active {
      background: var(--sidebar-active);
      color: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
    }
  
    /* Footer */
    .sidebar-footer {
      padding: 1rem;
      font-size: .85rem;
      color: rgba(255,255,255,.8);
      border-top: 1px solid rgba(255,255,255,.2);
    }
  </style>
</head>
<body>
  
  <aside class="sidebar d-flex flex-column p-3">
    
    <div class="brand mb-4 text-center">
      <img src="https://marketplace.canva.com/EAGre3wkiKc/1/0/1600w/canva-logotipo-veterinaria-ilustrado-lindo-azul-aqua-beige-g5Mq7lvYdmg.jpg" 
           alt="VetCare Logo" 
           class="brand-logo">
    </div>
  
    
    <ul class="nav flex-column gap-1">
      <li><a href="/dashboard" class="nav-link"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
      <li><a href="/cliente" class="nav-link"><i class="bi bi-people me-2"></i>Clientes</a></li>
      <li><a href="/mascota" class="nav-link"><i class="bi bi-bag-heart me-2"></i>Mascotas</a></li>
      <li><a href="/cita" class="nav-link"><i class="bi bi-calendar2-week me-2"></i>Citas</a></li>
      <li><a href="/venta" class="nav-link"><i class="bi bi-receipt me-2"></i>Ventas</a></li>
      <li><a href="/producto" class="nav-link"><i class="bi bi-box-seam me-2"></i>Productos</a></li>
      <li><a href="/usuario" class="nav-link"><i class="bi bi-person-gear me-2"></i>Usuarios</a></li>
      <li><a href="/pago" class="nav-link"><i class="bi bi-cash-coin me-2"></i>Pagos</a></li>
      <li><a href="/servicio" class="nav-link"><i class="bi bi-scissors me-2"></i>Servicios</a></li>
    </ul>
  
    
    <div class="sidebar-footer mt-auto text-center small">
      © 2025 VetCare
    </div>
  </aside>
  

  
  <main class="content">
    <div class="topbar d-flex align-items-center justify-content-between">
      <div>
        <h5 class="mb-0"><i class="bi bi-credit-card me-2"></i>Gestión de Pagos</h5>
        <small class="text-muted">Administra los pagos y transacciones</small>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-outline-primary btn-sm" onclick="exportarPagos()">
          <i class="bi bi-download me-1"></i> Exportar
        </button>
        <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#pagoModal">
          <i class="bi bi-plus-lg me-1"></i> Nuevo Pago
        </button>
      </div>
    </div>

    <div class="container-fluid py-4">
      
      <div class="card mb-4">
        <div class="card-body">
          <div class="row g-3">
            <div class="col-md-3">
              <label class="form-label">Buscar pago</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-search"></i></span>
                <input type="text" class="form-control" id="searchInput" placeholder="Cliente, cita, monto...">
              </div>
            </div>
            <div class="col-md-2">
              <label class="form-label">Estado</label>
              <select class="form-select" id="estadoFilter">
                <option value="">Todos</option>
                <option value="Pendiente">Pendiente</option>
                <option value="Completado">Completado</option>
                <option value="Cancelado">Cancelado</option>
              </select>
            </div>
            <div class="col-md-2">
              <label class="form-label">Método</label>
              <select class="form-select" id="metodoFilter">
                <option value="">Todos</option>
                <option value="Efectivo">Efectivo</option>
                <option value="Tarjeta">Tarjeta</option>
                <option value="Transferencia">Transferencia</option>
              </select>
            </div>
            <div class="col-md-2">
              <label class="form-label">Fecha desde</label>
              <input type="date" class="form-control" id="fechaDesde">
            </div>
            <div class="col-md-2">
              <label class="form-label">Fecha hasta</label>
              <input type="date" class="form-control" id="fechaHasta">
            </div>
            <div class="col-md-1 d-flex align-items-end">
              <button class="btn btn-outline-secondary w-100" onclick="limpiarFiltros()">
                <i class="bi bi-arrow-clockwise"></i>
              </button>
            </div>
          </div>
        </div>
      </div>

      
      <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
          <h6 class="mb-0"><i class="bi bi-list-ul me-2"></i>Lista de Pagos</h6>
          <span class="badge bg-primary" id="totalPagos">0 pagos</span>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th width="5%">ID</th>
                  <th width="15%">Cliente/Cita</th>
                  <th width="15%">Monto</th>
                  <th width="15%">Método</th>
                  <th width="15%">Fecha</th>
                  <th width="10%">Estado</th>
                  <th width="15%">Observaciones</th>
                  <th width="10%" class="text-center">Acciones</th>
                </tr>
              </thead>
              <tbody id="tbodyPagos">
                
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>

  
  <div class="modal fade" id="pagoModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <form id="formPago">
          <div class="modal-header bg-gradient text-white">
            <h5 class="modal-title">
              <i class="bi bi-credit-card me-2"></i>
              <span id="modalTitle">Nuevo Pago</span>
            </h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Cita <span class="text-danger">*</span></label>
                <select class="form-select" name="idCita" id="idCita" required>
                  <option value="">Seleccionar cita</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label">Monto (S/) <span class="text-danger">*</span></label>
                <input type="number" class="form-control" name="monto" id="monto" step="0.01" min="0" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Método de Pago <span class="text-danger">*</span></label>
                <select class="form-select" name="metodoPago" id="metodoPago" required>
                  <option value="">Seleccionar método</option>
                  <option value="Efectivo">Efectivo</option>
                  <option value="Tarjeta">Tarjeta</option>
                  <option value="Transferencia">Transferencia</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label">Estado</label>
                <select class="form-select" name="estado" id="estado">
                  <option value="Pendiente">Pendiente</option>
                  <option value="Completado">Completado</option>
                  <option value="Cancelado">Cancelado</option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label">Observaciones</label>
                <textarea class="form-control" name="observaciones" id="observaciones" rows="3"></textarea>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
              <i class="bi bi-x-lg me-1"></i> Cancelar
            </button>
            <button type="submit" class="btn btn-primary" id="btnGuardar">
              <i class="bi bi-check-lg me-1"></i> Guardar Pago
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.12.4/dist/sweetalert2.all.min.js"></script>
  <script>
    let pagos = [];
    let citas = [];
    let pagoEditando = null;

    document.addEventListener("DOMContentLoaded", function() {
      loadPagos();
      loadCitas();
      setupEventListeners();
    });

    function setupEventListeners() {
      document.getElementById('searchInput').addEventListener('input', debounce(filterPagos, 300));
      document.getElementById('estadoFilter').addEventListener('change', filterPagos);
      document.getElementById('metodoFilter').addEventListener('change', filterPagos);
      document.getElementById('fechaDesde').addEventListener('change', filterPagos);
      document.getElementById('fechaHasta').addEventListener('change', filterPagos);
      document.getElementById('formPago').addEventListener('submit', handleSubmitPago);
      document.getElementById('idCita').addEventListener('change', updateMonto);
    }

    async function loadPagos() {
      try {
        const res = await fetch("/api/pagos");
        if (!res.ok) throw new Error('Error al cargar pagos');
        
        const data = await res.json();
        pagos = data;
        renderPagos();
      } catch (error) {
        console.error("Error:", error);
        showError("Error al cargar los pagos");
      }
    }

    async function loadCitas() {
      try {
        const res = await fetch("/api/citas");
        if (!res.ok) throw new Error('Error al cargar citas');
        
        const data = await res.json();
        citas = data;
        populateCitasSelect();
      } catch (error) {
        console.error("Error:", error);
      }
    }

    function populateCitasSelect() {
      const select = document.getElementById('idCita');
      select.innerHTML = '<option value="">Seleccionar cita</option>';
      citas.forEach(cita => {
        const option = document.createElement('option');
        option.value = cita.id;
        option.textContent = `#${cita.id} - ${cita.cliente} (${cita.mascota})`;
        option.dataset.precio = cita.precioServicio || 0;
        select.appendChild(option);
      });
    }

    function updateMonto() {
      const citaId = document.getElementById('idCita').value;
      const montoInput = document.getElementById('monto');
      
      if (citaId) {
        const cita = citas.find(c => c.id == citaId);
        if (cita && cita.precioServicio) {
          montoInput.value = cita.precioServicio;
        }
      } else {
        montoInput.value = '';
      }
    }

    function renderPagos() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const estadoFilter = document.getElementById('estadoFilter').value;
      const metodoFilter = document.getElementById('metodoFilter').value;
      const fechaDesde = document.getElementById('fechaDesde').value;
      const fechaHasta = document.getElementById('fechaHasta').value;
      
      let filteredPagos = pagos.filter(pago => {
        if (searchTerm) {
          const cliente = (pago.cliente || '').toLowerCase();
          const cita = (pago.cita || '').toLowerCase();
          const monto = pago.monto.toString();
          if (!cliente.includes(searchTerm) && !cita.includes(searchTerm) && !monto.includes(searchTerm)) {
            return false;
          }
        }
        
        if (estadoFilter && pago.estado !== estadoFilter) {
          return false;
        }
        
        if (metodoFilter && pago.metodoPago !== metodoFilter) {
          return false;
        }
        
        if (fechaDesde) {
          const fechaPago = new Date(pago.fechaPago).toISOString().split('T')[0];
          if (fechaPago < fechaDesde) {
            return false;
          }
        }
        
        if (fechaHasta) {
          const fechaPago = new Date(pago.fechaPago).toISOString().split('T')[0];
          if (fechaPago > fechaHasta) {
            return false;
          }
        }
        
        return true;
      });

      renderPagosTable(filteredPagos);
    }

    function renderPagosTable(pagos) {
      const tbody = document.getElementById("tbodyPagos");
      
      if (pagos.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="8" class="text-center py-4">
              <i class="bi bi-credit-card fs-1 text-muted"></i>
              <p class="text-muted mt-2">No se encontraron pagos</p>
            </td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = pagos.map(pago => `
        <tr>
          <td><span class="fw-semibold">#${pago.id}</span></td>
          <td>
            <div>
              <div class="fw-semibold">${pago.cliente || '-'}</div>
              <div class="small text-muted">Cita #${pago.idCita}</div>
            </div>
          </td>
          <td><span class="fw-bold text-success">S/ ${pago.monto}</span></td>
          <td><span class="badge bg-info">${pago.metodoPago}</span></td>
          <td>
            <div>
              <div class="fw-semibold">${new Date(pago.fechaPago).toLocaleDateString()}</div>
              <div class="small text-muted">${new Date(pago.fechaPago).toLocaleTimeString()}</div>
            </div>
          </td>
          <td><span class="badge ${getEstadoBadgeClass(pago.estado)}">${pago.estado}</span></td>
          <td><span class="text-muted small">${pago.observaciones || '-'}</span></td>
          <td class="text-center">
            <div class="btn-group btn-group-sm">
              <button class="btn btn-outline-primary" onclick="editarPago(${pago.id})" title="Editar">
                <i class="bi bi-pencil"></i>
              </button>
              <button class="btn btn-outline-info" onclick="verDetalles(${pago.id})" title="Ver detalles">
                <i class="bi bi-eye"></i>
              </button>
              <button class="btn btn-outline-danger" onclick="eliminarPago(${pago.id})" title="Eliminar">
                <i class="bi bi-trash"></i>
              </button>
            </div>
          </td>
        </tr>
      `).join('');

      document.getElementById('totalPagos').textContent = `${pagos.length} pagos`;
    }

    function getEstadoBadgeClass(estado) {
      switch(estado) {
        case 'Completado': return 'bg-success';
        case 'Pendiente': return 'bg-warning';
        case 'Cancelado': return 'bg-danger';
        default: return 'bg-secondary';
      }
    }

    function filterPagos() {
      renderPagos();
    }

    function limpiarFiltros() {
      document.getElementById('searchInput').value = '';
      document.getElementById('estadoFilter').value = '';
      document.getElementById('metodoFilter').value = '';
      document.getElementById('fechaDesde').value = '';
      document.getElementById('fechaHasta').value = '';
      renderPagos();
    }

    async function handleSubmitPago(e) {
      e.preventDefault();
      
      const formData = new FormData(e.target);
      const pagoData = {
        idCita: parseInt(formData.get('idCita')),
        monto: parseFloat(formData.get('monto')),
        metodoPago: formData.get('metodoPago'),
        estado: formData.get('estado'),
        observaciones: formData.get('observaciones')
      };
      
      try {
        const url = pagoEditando ? `/api/pagos/${pagoEditando}` : '/api/pagos';
        const method = pagoEditando ? 'PUT' : 'POST';
        
        const response = await fetch(url, {
          method: method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(pagoData)
        });

        if (!response.ok) throw new Error('Error al guardar pago');

        showSuccess(pagoEditando ? 'Pago actualizado correctamente' : 'Pago registrado correctamente');
        
        bootstrap.Modal.getInstance(document.getElementById('pagoModal')).hide();
        document.getElementById('formPago').reset();
        pagoEditando = null;
        document.getElementById('modalTitle').textContent = 'Nuevo Pago';
        loadPagos();
        
      } catch (error) {
        console.error('Error:', error);
        showError('Error al guardar el pago');
      }
    }

    function editarPago(id) {
      const pago = pagos.find(p => p.id === id);
      if (!pago) return;
      
      pagoEditando = id;
      document.getElementById('modalTitle').textContent = 'Editar Pago';
      
      document.getElementById('idCita').value = pago.idCita;
      document.getElementById('monto').value = pago.monto;
      document.getElementById('metodoPago').value = pago.metodoPago;
      document.getElementById('estado').value = pago.estado;
      document.getElementById('observaciones').value = pago.observaciones || '';
      
      new bootstrap.Modal(document.getElementById('pagoModal')).show();
    }

    function verDetalles(id) {
      const pago = pagos.find(p => p.id === id);
      if (!pago) return;
      
      showInfo(`
        <strong>Pago #${pago.id}</strong><br>
        <strong>Cliente:</strong> ${pago.cliente}<br>
        <strong>Cita:</strong> #${pago.idCita}<br>
        <strong>Monto:</strong> S/ ${pago.monto}<br>
        <strong>Método:</strong> ${pago.metodoPago}<br>
        <strong>Estado:</strong> ${pago.estado}<br>
        <strong>Fecha:</strong> ${new Date(pago.fechaPago).toLocaleString()}<br>
        <strong>Observaciones:</strong> ${pago.observaciones || 'Sin observaciones'}
      `);
    }

    async function eliminarPago(id) {
      const pago = pagos.find(p => p.id === id);
      if (!pago) return;

      const result = await Swal.fire({
        title: '¿Estás seguro?',
        text: `Se eliminará el pago #${pago.id}`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#d33',
        cancelButtonColor: '#3085d6',
        confirmButtonText: 'Sí, eliminar',
        cancelButtonText: 'Cancelar'
      });

      if (result.isConfirmed) {
        try {
          const response = await fetch(`/api/pagos/${id}`, { method: 'DELETE' });
          if (!response.ok) throw new Error('Error al eliminar pago');

          showSuccess('Pago eliminado correctamente');
          loadPagos();
        } catch (error) {
          console.error('Error:', error);
          showError('Error al eliminar el pago');
        }
      }
    }

    function exportarPagos() {
      showInfo('Función de exportación en desarrollo');
    }

    function debounce(func, wait) {
      let timeout;
      return function executedFunction(...args) {
        const later = () => {
          clearTimeout(timeout);
          func(...args);
        };
        clearTimeout(timeout);
        timeout = setTimeout(later, wait);
      };
    }

    function showSuccess(message) {
      Swal.fire({
        title: '¡Éxito!',
        text: message,
        icon: 'success',
        timer: 2000,
        showConfirmButton: false
      });
    }

    function showError(message) {
      Swal.fire({
        title: 'Error',
        text: message,
        icon: 'error'
      });
    }

    function showInfo(message) {
      Swal.fire({
        title: 'Información',
        html: message,
        icon: 'info'
      });
    }
  </script>
</body>
</html>
