<style>
  :root {
    --brand:#0066cc;
    --brand-2:#00bcd4;
    --sidebar-bg:#0d1117;
    --sidebar-hover:#1f2a38;
    --sidebar-active:linear-gradient(135deg, var(--brand), var(--brand-2));
  }

  /* ===== SIDEBAR ===== */
  .sidebar {
    position:fixed;
    inset-block:0;
    inset-inline-start:0;
    width:260px;
    background:var(--sidebar-bg);
    color:#c9d1d9;
    z-index:1030;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
  }

  .sidebar .brand {
    display:flex;
    align-items:center;
    gap:.8rem;
    padding:1rem 1.2rem;
    font-weight:700;
    font-size:1.2rem;
    background:rgba(255,255,255,.05);
    border-radius:.6rem;
    margin-bottom:1.5rem;
  }
  .brand-icon {
    background:var(--brand-2);
    color:#fff;
    font-size:1.5rem;
    border-radius:.5rem;
    padding:.5rem;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .brand small {
    display:block;
    font-size:.75rem;
    color:#8b949e;
    font-weight:500;
  }

  /* ===== NAV ===== */
  .sidebar .nav {
    flex-grow:1;
  }

  .sidebar .nav-link {
    color:#a7b1cc;
    border-radius:.6rem;
    padding:.65rem 1rem;
    display:flex;
    align-items:center;
    gap:.6rem;
    transition:all .2s;
    font-weight:500;
  }

  .sidebar .nav-link i {
    font-size:1.1rem;
    opacity:.8;
  }

  .sidebar .nav-link:hover {
    background:var(--sidebar-hover);
    color:#fff;
  }

  .sidebar .nav-link.active {
    background:var(--sidebar-active);
    color:#fff;
    box-shadow:0 2px 8px rgba(0,0,0,.3);
  }

  /* ===== FOOTER MINI ===== */
  .sidebar-footer {
    padding:1rem;
    font-size:.85rem;
    color:#8b949e;
    border-top:1px solid rgba(255,255,255,.08);
  }
</style>
