<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Clientes · VetCare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.12.4/dist/sweetalert2.min.css" rel="stylesheet">
  <link href="/css/global.css" rel="stylesheet">
  
  <style>
    :root {
      --sidebar-bg: linear-gradient(180deg, #84cddb, #b4dadf);
      --sidebar-hover: rgba(255, 255, 255, 0.15);
      --text-color: #ffffff;
    }
  
    /* Sidebar */
    .sidebar {
      position: fixed;
      inset-block: 0;
      inset-inline-start: 0;
      width: 260px;
      background: var(--sidebar-bg);
      color: var(--text-color);
      z-index: 1030;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      border-right: 3px solid rgba(255,255,255,0.1);
    }
  
    /* Logo */
    .brand-logo {
      width: 90%;
      border-radius: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      transition: transform .3s ease;
    }
    .brand-logo:hover {
      transform: scale(1.05);
    }
  
    /* Menú */
    .sidebar .nav-link {
      color: var(--text-color);
      border-radius: .6rem;
      padding: .65rem 1rem;
      display: flex;
      align-items: center;
      gap: .6rem;
      transition: all .2s;
      font-weight: 500;
    }
  
    .sidebar .nav-link:hover,
    .sidebar .nav-link:focus {
      background: var(--sidebar-hover);
      box-shadow: inset 0 0 8px rgba(0,0,0,0.2);
      outline: none;
    }
  
    /* Footer */
    .sidebar-footer {
      padding: 1rem;
      font-size: .85rem;
      color: rgba(255,255,255,.8);
      border-top: 1px solid rgba(255,255,255,.2);
    }
  </style>
  
</head>
<body>
  
  <aside class="sidebar d-flex flex-column p-3">
    
    <div class="brand mb-4 text-center">
      <img src="https://marketplace.canva.com/EAGre3wkiKc/1/0/1600w/canva-logotipo-veterinaria-ilustrado-lindo-azul-aqua-beige-g5Mq7lvYdmg.jpg" 
           alt="VetCare Logo" 
           class="brand-logo">
    </div>
  
    
    <ul class="nav flex-column gap-1">
      <li><a href="/dashboard" class="nav-link"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
      <li><a href="/cliente" class="nav-link"><i class="bi bi-people me-2"></i>Clientes</a></li>
      <li><a href="/mascota" class="nav-link"><i class="bi bi-bag-heart me-2"></i>Mascotas</a></li>
      <li><a href="/cita" class="nav-link"><i class="bi bi-calendar2-week me-2"></i>Citas</a></li>
      <li><a href="/venta" class="nav-link"><i class="bi bi-receipt me-2"></i>Ventas</a></li>
      <li><a href="/producto" class="nav-link"><i class="bi bi-box-seam me-2"></i>Productos</a></li>
      <li><a href="/usuario" class="nav-link"><i class="bi bi-person-gear me-2"></i>Usuarios</a></li>
      <li><a href="/pago" class="nav-link"><i class="bi bi-cash-coin me-2"></i>Pagos</a></li>
      <li><a href="/servicio" class="nav-link"><i class="bi bi-scissors me-2"></i>Servicios</a></li>
    </ul>
  
    
    <div class="sidebar-footer mt-auto text-center small">
      © 2025 VetCare
    </div>
  </aside>
  

  
  <main class="content">
    <div class="topbar d-flex align-items-center justify-content-between">
      <div>
        <h5 class="mb-0"><i class="bi bi-people me-2"></i>Gestión de Clientes</h5>
        <small class="text-muted">Administra la información de tus clientes</small>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-outline-primary btn-sm" onclick="exportarClientes()">
          <i class="bi bi-download me-1"></i> Exportar
        </button>
        <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#clienteModal">
          <i class="bi bi-person-plus me-1"></i> Nuevo Cliente
        </button>
      </div>
    </div>

    <div class="container-fluid py-4">
      
      <div class="card mb-4">
        <div class="card-body">
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label">Buscar cliente</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-search"></i></span>
                <input type="text" class="form-control" id="searchInput" placeholder="Nombre, apellido, teléfono...">
              </div>
            </div>
            <div class="col-md-3">
              <label class="form-label">Fecha registro desde</label>
              <input type="date" class="form-control" id="fechaDesde">
            </div>
            <div class="col-md-3">
              <label class="form-label">Fecha registro hasta</label>
              <input type="date" class="form-control" id="fechaHasta">
            </div>
            <div class="col-md-2 d-flex align-items-end">
              <button class="btn btn-outline-secondary w-100" onclick="limpiarFiltros()">
                <i class="bi bi-arrow-clockwise me-1"></i> Limpiar
              </button>
            </div>
          </div>
        </div>
      </div>

      
      <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
          <h6 class="mb-0"><i class="bi bi-list-ul me-2"></i>Lista de Clientes</h6>
          <span class="badge bg-primary" id="totalClientes">0 clientes</span>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th width="5%">ID</th>
                  <th width="15%">Cliente</th>
                  <th width="15%">Contacto</th>
                  <th width="20%">Dirección</th>
                  <th width="15%">Mascotas</th>
                  <th width="15%">Fecha Registro</th>
                  <th width="15%" class="text-center">Acciones</th>
                </tr>
              </thead>
              <tbody id="tbodyClientes">
                
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>

  
  <div class="modal fade" id="clienteModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <form id="formCliente">
          <div class="modal-header bg-gradient text-white">
            <h5 class="modal-title">
              <i class="bi bi-person me-2"></i>
              <span id="modalTitle">Nuevo Cliente</span>
            </h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Nombre <span class="text-danger">*</span></label>
                <input type="text" class="form-control" name="nombre" id="nombre" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Apellido <span class="text-danger">*</span></label>
                <input type="text" class="form-control" name="apellido" id="apellido" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Teléfono</label>
                <input type="tel" class="form-control" name="telefono" id="telefono">
              </div>
              <div class="col-md-6">
                <label class="form-label">Correo</label>
                <input type="email" class="form-control" name="correo" id="correo">
              </div>
              <div class="col-12">
                <label class="form-label">Dirección</label>
                <textarea class="form-control" name="direccion" id="direccion" rows="2"></textarea>
              </div>
              <div class="col-12">
                <label class="form-label">Imagen</label>
                <input type="url" class="form-control" name="imagen" id="imagen" placeholder="https://ejemplo.com/imagen.jpg">
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
              <i class="bi bi-x-lg me-1"></i> Cancelar
            </button>
            <button type="submit" class="btn btn-primary" id="btnGuardar">
              <i class="bi bi-check-lg me-1"></i> Guardar Cliente
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>


  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.12.4/dist/sweetalert2.all.min.js"></script>
  <script>
    let clientes = [];
    let clienteEditando = null;

    document.addEventListener("DOMContentLoaded", function() {
      loadClientes();
      setupEventListeners();
    });

    function setupEventListeners() {
      document.getElementById('searchInput').addEventListener('input', debounce(filterClientes, 300));
      document.getElementById('fechaDesde').addEventListener('change', filterClientes);
      document.getElementById('fechaHasta').addEventListener('change', filterClientes);
      document.getElementById('formCliente').addEventListener('submit', handleSubmitCliente);
    }

    async function loadClientes() {
      try {
        const res = await fetch("/api/clientes");
        if (!res.ok) throw new Error('Error al cargar clientes');
        
        const data = await res.json();
        clientes = data;
        
        // Cargar mascotas para cada cliente
        await loadMascotasForClientes();
        
        renderClientes();
      } catch (error) {
        console.error("Error:", error);
        showError("Error al cargar los clientes");
      }
    }

    async function loadMascotasForClientes() {
      try {
        const res = await fetch("/api/mascotas");
        if (res.ok) {
          const mascotas = await res.json();
          
          // Agrupar mascotas por cliente
          const mascotasPorCliente = {};
          mascotas.forEach(mascota => {
            if (mascota.idCliente) {
              if (!mascotasPorCliente[mascota.idCliente]) {
                mascotasPorCliente[mascota.idCliente] = 0;
              }
              mascotasPorCliente[mascota.idCliente]++;
            }
          });
          
          // Asignar conteo a cada cliente
          clientes.forEach(cliente => {
            cliente.totalMascotas = mascotasPorCliente[cliente.id] || 0;
          });
        }
      } catch (error) {
        console.error("Error al cargar mascotas:", error);
      }
    }

    function renderClientes() {
      const tbody = document.getElementById("tbodyClientes");
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const fechaDesde = document.getElementById('fechaDesde').value;
      const fechaHasta = document.getElementById('fechaHasta').value;
      
      let filteredClientes = clientes.filter(cliente => {
        if (searchTerm) {
          const nombre = (cliente.nombre + ' ' + cliente.apellido).toLowerCase();
          const telefono = cliente.telefono || '';
          if (!nombre.includes(searchTerm) && !telefono.includes(searchTerm)) {
            return false;
          }
        }
        
        if (fechaDesde) {
          const fechaRegistro = new Date(cliente.fechaRegistro).toISOString().split('T')[0];
          if (fechaRegistro < fechaDesde) {
            return false;
          }
        }
        
        if (fechaHasta) {
          const fechaRegistro = new Date(cliente.fechaRegistro).toISOString().split('T')[0];
          if (fechaRegistro > fechaHasta) {
            return false;
          }
        }
        
        return true;
      });

      tbody.innerHTML = '';
      if (filteredClientes.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="7" class="text-center py-4">
              <i class="bi bi-people fs-1 text-muted"></i>
              <p class="text-muted mt-2">No se encontraron clientes</p>
            </td>
          </tr>
        `;
      } else {
        filteredClientes.forEach(cliente => {
          const row = createClienteRow(cliente);
          tbody.appendChild(row);
        });
      }

      document.getElementById('totalClientes').textContent = `${filteredClientes.length} clientes`;
    }

    function createClienteRow(cliente) {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>
          <span class="fw-semibold">#${cliente.id}</span>
        </td>
        <td>
          <div class="d-flex align-items-center">
            <img src="${cliente.imagen || 'https://i.pravatar.cc/40'}" alt="Avatar" class="rounded-circle me-2" width="32" height="32">
            <div>
              <div class="fw-semibold">${cliente.nombre} ${cliente.apellido}</div>
            </div>
          </div>
        </td>
        <td>
          <div>
            <div class="small text-muted">${cliente.telefono || '-'}</div>
            <div class="small text-muted">${cliente.correo || '-'}</div>
          </div>
        </td>
        <td>
          <span class="text-muted small">${cliente.direccion || '-'}</span>
        </td>
        <td>
          <span class="badge bg-info">${cliente.totalMascotas || 0} mascotas</span>
        </td>
        <td>
          <span class="text-muted">${new Date(cliente.fechaRegistro).toLocaleDateString()}</span>
        </td>
        <td class="text-center">
          <div class="btn-group btn-group-sm">
            <button class="btn btn-outline-primary" onclick="editarCliente(${cliente.id})" title="Editar">
              <i class="bi bi-pencil"></i>
            </button>
            <button class="btn btn-outline-info" onclick="verMascotas(${cliente.id})" title="Ver mascotas">
              <i class="bi bi-heart"></i>
            </button>
            <button class="btn btn-outline-danger" onclick="eliminarCliente(${cliente.id})" title="Eliminar">
              <i class="bi bi-trash"></i>
            </button>
          </div>
        </td>
      `;
      return tr;
    }

    function filterClientes() {
      renderClientes();
    }

    function limpiarFiltros() {
      document.getElementById('searchInput').value = '';
      document.getElementById('fechaDesde').value = '';
      document.getElementById('fechaHasta').value = '';
      renderClientes();
    }

    async function handleSubmitCliente(e) {
      e.preventDefault();
      
      const formData = new FormData(e.target);
      const clienteData = {
        nombre: formData.get('nombre'),
        apellido: formData.get('apellido'),
        telefono: formData.get('telefono'),
        correo: formData.get('correo'),
        direccion: formData.get('direccion'),
        imagen: formData.get('imagen')
      };
      
      try {
        const url = clienteEditando ? `/api/clientes/${clienteEditando}` : '/api/clientes';
        const method = clienteEditando ? 'PUT' : 'POST';
        
        const response = await fetch(url, {
          method: method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(clienteData)
        });

        if (!response.ok) throw new Error('Error al guardar cliente');

        showSuccess(clienteEditando ? 'Cliente actualizado correctamente' : 'Cliente registrado correctamente');
        
        bootstrap.Modal.getInstance(document.getElementById('clienteModal')).hide();
        document.getElementById('formCliente').reset();
        clienteEditando = null;
        document.getElementById('modalTitle').textContent = 'Nuevo Cliente';
        await loadClientes();
        
      } catch (error) {
        console.error('Error:', error);
        showError('Error al guardar el cliente');
      }
    }

    function editarCliente(id) {
      const cliente = clientes.find(c => c.id === id);
      if (!cliente) return;
      
      clienteEditando = id;
      document.getElementById('modalTitle').textContent = 'Editar Cliente';
      
      document.getElementById('nombre').value = cliente.nombre;
      document.getElementById('apellido').value = cliente.apellido;
      document.getElementById('telefono').value = cliente.telefono || '';
      document.getElementById('correo').value = cliente.correo || '';
      document.getElementById('direccion').value = cliente.direccion || '';
      document.getElementById('imagen').value = cliente.imagen || '';
      
      new bootstrap.Modal(document.getElementById('clienteModal')).show();
    }

    function verMascotas(id) {
      // Redirigir a la página de mascotas con el filtro del cliente
      window.location.href = `/mascota?cliente=${id}`;
    }

    async function eliminarCliente(id) {
      const cliente = clientes.find(c => c.id === id);
      if (!cliente) return;

      const result = await Swal.fire({
        title: '¿Estás seguro?',
        text: `Se eliminará el cliente ${cliente.nombre} ${cliente.apellido}`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#d33',
        cancelButtonColor: '#3085d6',
        confirmButtonText: 'Sí, eliminar',
        cancelButtonText: 'Cancelar'
      });

      if (result.isConfirmed) {
        try {
          const response = await fetch(`/api/clientes/${id}`, { method: 'DELETE' });
          if (!response.ok) throw new Error('Error al eliminar cliente');

          showSuccess('Cliente eliminado correctamente');
          await loadClientes();
        } catch (error) {
          console.error('Error:', error);
          showError('Error al eliminar el cliente');
        }
      }
    }

    function exportarClientes() {
      showInfo('Función de exportación en desarrollo');
    }

    function debounce(func, wait) {
      let timeout;
      return function executedFunction(...args) {
        const later = () => {
          clearTimeout(timeout);
          func(...args);
        };
        clearTimeout(timeout);
        timeout = setTimeout(later, wait);
      };
    }

    function showSuccess(message) {
      Swal.fire({
        title: '¡Éxito!',
        text: message,
        icon: 'success',
        timer: 2000,
        showConfirmButton: false
      });
    }

    function showError(message) {
      Swal.fire({
        title: 'Error',
        text: message,
        icon: 'error'
      });
    }

    function showInfo(message) {
      Swal.fire({
        title: 'Información',
        text: message,
        icon: 'info'
      });
    }

  </script>
</body>
</html>
