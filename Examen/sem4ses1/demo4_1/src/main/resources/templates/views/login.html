<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Login | Peluquería Mascotas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    body {
      background: linear-gradient(135deg, #f8f9fa, #e0f7fa);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .login-card {
      border: none;
      border-radius: 1rem;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    .login-left {
      background: url('https://images.unsplash.com/photo-1601758123927-1975a5e2b94c?q=80&w=1000') center/cover no-repeat;
      min-height: 100%;
    }
    .login-right {
      padding: 2rem;
      background-color: #fff;
    }
    .brand {
      font-weight: bold;
      color: #0066cc;
      font-size: 1.5rem;
    }
    .brand small {
      color: #00bcd4;
    }
    .form-control {
      border-radius: .6rem;
    }
    .btn-login {
      background: linear-gradient(135deg, #0066cc, #00bcd4);
      border: none;
      border-radius: .6rem;
      color: #fff;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .btn-login:hover {
      transform: scale(1.02);
      background: linear-gradient(135deg, #005bb5, #00a5bb);
    }
    .icon-paw {
      font-size: 2rem;
      color: #00bcd4;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-lg-8 col-xl-7">
      <div class="card login-card">
        <div class="row g-0">
          <!-- Imagen lateral -->
          <div class="col-md-5 d-none d-md-block login-left"></div>

          <!-- Formulario -->
          <div class="col-md-7 d-flex align-items-center">
            <div class="login-right w-100">
              <div class="text-center mb-4">
                <i class="bi bi-scissors icon-paw"></i>
                <div class="brand">Peluquería <small>Mascotas</small></div>
                <p class="text-muted small">Bienvenido, inicia sesión para continuar</p>
              </div>

              <!-- Mostrar error si existe -->
              <div th:if="${error}" class="alert alert-danger py-2" role="alert">
                <i class="bi bi-exclamation-circle"></i>
                <span th:text="${error}"></span>
              </div>

              <!-- Formulario login -->
              <form th:action="@{/login}" th:object="${loginDTO}" method="post">
                <div class="mb-3">
                  <label for="correo" class="form-label">Correo</label>
                  <input type="email" id="correo" th:field="*{correo}" class="form-control" placeholder="ejemplo@correo.com" required>
                </div>
                <div class="mb-3">
                  <label for="password" class="form-label">Contraseña</label>
                  <input type="password" id="password" th:field="*{password}" class="form-control" placeholder="••••••••" required>
                </div>
                <div class="d-grid mb-3">
                  <button type="submit" class="btn btn-login">Iniciar Sesión</button>
                </div>
              </form>

            </div>
          </div>
        </div> 
      </div>
    </div>
  </div>
</div>

</body>
</html>
