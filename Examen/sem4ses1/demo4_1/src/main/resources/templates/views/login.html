<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Login | Peluquería Mascotas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    body {
      background: linear-gradient(135deg, #f8f9fa, #e0f7fa);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .login-card {
      border: none;
      border-radius: 1rem;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    .login-left {
      min-height: 100%;
      padding: 0;
      overflow: hidden;
      position: relative;
    }
    .login-left::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 1;
    }
    .login-left .position-absolute {
      z-index: 2;
    }
    .login-right {
      padding: 2rem;
      background-color: #fff;
    }
    .brand {
      font-weight: bold;
      color: #0066cc;
      font-size: 1.5rem;
    }
    .brand small {
      color: #00bcd4;
    }
    .form-control {
      border-radius: .6rem;
    }
    .btn-login {
      background: linear-gradient(135deg, #0066cc, #00bcd4);
      border: none;
      border-radius: .6rem;
      color: #fff;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .btn-login:hover {
      transform: scale(1.02);
      background: linear-gradient(135deg, #005bb5, #00a5bb);
    }
    .icon-paw {
      font-size: 2rem;
      color: #00bcd4;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-lg-8 col-xl-7">
      <div class="card login-card">
        <div class="row g-0">
          
          <div class="col-md-5 d-none d-md-block login-left position-relative">
            <img src="https://images.unsplash.com/photo-1601758123927-1975a5e2b94c?q=80&w=1000" 
                 alt="Peluquería de Mascotas" 
                 class="img-fluid h-100 w-100" 
                 style="object-fit: cover;">
            <div class="position-absolute top-50 start-50 translate-middle text-center text-white">
              <i class="bi bi-scissors" style="font-size: 3rem; margin-bottom: 1rem;"></i>
              <h3 class="fw-bold mb-2">VetCare</h3>
              <p class="mb-0">Cuidando a tus mascotas con amor</p>
            </div>
          </div>

          
          <div class="col-md-7 d-flex align-items-center">
            <div class="login-right w-100">
              <div class="text-center mb-4">
                <i class="bi bi-scissors icon-paw"></i>
                <div class="brand">Peluquería <small>Mascotas</small></div>
                <p class="text-muted small">Bienvenido, inicia sesión para continuar</p>
              </div>

              
              <div th:if="${param.error}" class="alert alert-danger py-2" role="alert">
                <i class="bi bi-exclamation-circle"></i>
                <span>Correo o contraseña incorrectos</span>
              </div>

              
              <div th:if="${param.logout}" class="alert alert-success py-2" role="alert">
                <i class="bi bi-check-circle"></i>
                <span>Sesión cerrada correctamente</span>
              </div>

              
              <form th:action="@{/login}" method="post">
                <div class="mb-3">
                  <label for="username" class="form-label">Correo</label>
                  <input type="email" id="username" name="username" class="form-control" placeholder="ejemplo@correo.com" required>
                </div>
                <div class="mb-3">
                  <label for="password" class="form-label">Contraseña</label>
                  <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <div class="d-grid mb-3">
                  <button type="submit" class="btn btn-login">Iniciar Sesión</button>
                </div>
              </form>

            </div>
          </div>
        </div> 
      </div>
    </div>
  </div>
</div>

</body>
</html>
