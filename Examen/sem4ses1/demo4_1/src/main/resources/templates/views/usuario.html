<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Usuarios · VetCare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.12.4/dist/sweetalert2.min.css" rel="stylesheet">
  <link href="/css/global.css" rel="stylesheet">

    
  <style>
    :root {
      --sidebar-bg: linear-gradient(180deg, #84cddb, #b4dadf);
      --sidebar-hover: rgba(255, 255, 255, 0.15);
      --sidebar-active: linear-gradient(135deg, #4facfe, #00f2fe);
      --text-color: #ffffff;
    }
  
    /* Sidebar */
    .sidebar {
      position: fixed;
      inset-block: 0;
      inset-inline-start: 0;
      width: 260px;
      background: var(--sidebar-bg);
      color: var(--text-color);
      z-index: 1030;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      border-right: 3px solid rgba(255,255,255,0.1);
    }
  
    /* Logo */
    .brand-logo {
      width: 90%;
      border-radius: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      transition: transform .3s ease;
    }
    .brand-logo:hover {
      transform: scale(1.05);
    }
  
    /* Menú */
    .sidebar .nav-link {
      color: var(--text-color);
      border-radius: .6rem;
      padding: .65rem 1rem;
      display: flex;
      align-items: center;
      gap: .6rem;
      transition: all .2s;
      font-weight: 500;
    }
  
    .sidebar .nav-link:hover {
      background: var(--sidebar-hover);
    }
  
    .sidebar .nav-link.active {
      background: var(--sidebar-active);
      color: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
    }
  
    /* Footer */
    .sidebar-footer {
      padding: 1rem;
      font-size: .85rem;
      color: rgba(255,255,255,.8);
      border-top: 1px solid rgba(255,255,255,.2);
    }
  </style>
  
  
</head>
<body>
  
  <aside class="sidebar d-flex flex-column p-3">
    
    <div class="brand mb-4 text-center">
      <img src="https://marketplace.canva.com/EAGre3wkiKc/1/0/1600w/canva-logotipo-veterinaria-ilustrado-lindo-azul-aqua-beige-g5Mq7lvYdmg.jpg" 
           alt="VetCare Logo" 
           class="brand-logo">
    </div>
  
    
    <ul class="nav flex-column gap-1">
      <li><a href="/dashboard" class="nav-link"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
      <li><a href="/cliente" class="nav-link"><i class="bi bi-people me-2"></i>Clientes</a></li>
      <li><a href="/mascota" class="nav-link"><i class="bi bi-bag-heart me-2"></i>Mascotas</a></li>
      <li><a href="/cita" class="nav-link"><i class="bi bi-calendar2-week me-2"></i>Citas</a></li>
      <li><a href="/venta" class="nav-link"><i class="bi bi-receipt me-2"></i>Ventas</a></li>
      <li><a href="/producto" class="nav-link"><i class="bi bi-box-seam me-2"></i>Productos</a></li>
      <li><a href="/usuario" class="nav-link"><i class="bi bi-person-gear me-2"></i>Usuarios</a></li>
      <li><a href="/pago" class="nav-link"><i class="bi bi-cash-coin me-2"></i>Pagos</a></li>
      <li><a href="/servicio" class="nav-link"><i class="bi bi-scissors me-2"></i>Servicios</a></li>
    </ul>
  
    
    <div class="sidebar-footer mt-auto text-center small">
      © 2025 VetCare
    </div>
  </aside>
  
  
  <main class="content">
    <div class="topbar d-flex align-items-center justify-content-between">
      <div>
        <h5 class="mb-0"><i class="bi bi-person-gear me-2"></i>Gestión de Usuarios</h5>
        <small class="text-muted">Administra los usuarios del sistema</small>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-outline-primary btn-sm" onclick="exportarUsuarios()">
          <i class="bi bi-download me-1"></i> Exportar
        </button>
        <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#usuarioModal">
          <i class="bi bi-plus-lg me-1"></i> Nuevo Usuario
        </button>
      </div>
    </div>

    <div class="container-fluid py-4">
      
      <div class="card mb-4">
        <div class="card-body">
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label">Buscar usuario</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-search"></i></span>
                <input type="text" class="form-control" id="searchInput" placeholder="Nombre, correo, rol...">
              </div>
            </div>
            <div class="col-md-3">
              <label class="form-label">Rol</label>
              <select class="form-select" id="rolFilter">
                <option value="">Todos</option>
                <option value="Administrador">Administrador</option>
                <option value="Recepcionista">Recepcionista</option>
                <option value="Peluquero">Peluquero</option>
              </select>
            </div>
            <div class="col-md-3">
              <label class="form-label">Estado</label>
              <select class="form-select" id="estadoFilter">
                <option value="">Todos</option>
                <option value="true">Activo</option>
                <option value="false">Inactivo</option>
              </select>
            </div>
            <div class="col-md-2 d-flex align-items-end">
              <button class="btn btn-outline-secondary w-100" onclick="limpiarFiltros()">
                <i class="bi bi-arrow-clockwise me-1"></i> Limpiar
              </button>
            </div>
          </div>
        </div>
      </div>

      
      <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
          <h6 class="mb-0"><i class="bi bi-list-ul me-2"></i>Lista de Usuarios</h6>
          <span class="badge bg-primary" id="totalUsuarios">0 usuarios</span>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th width="5%">ID</th>
                  <th width="20%">Usuario</th>
                  <th width="20%">Correo</th>
                  <th width="15%">Rol</th>
                  <th width="15%">Estado</th>
                  <th width="15%">Fecha Creación</th>
                  <th width="10%" class="text-center">Acciones</th>
                </tr>
              </thead>
              <tbody id="tbodyUsuarios">
                
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>

  
  <div class="modal fade" id="usuarioModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <form id="formUsuario">
          <div class="modal-header bg-gradient text-white">
            <h5 class="modal-title">
              <i class="bi bi-person-gear me-2"></i>
              <span id="modalTitle">Nuevo Usuario</span>
            </h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Nombre <span class="text-danger">*</span></label>
                <input type="text" class="form-control" name="nombre" id="nombre" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Correo <span class="text-danger">*</span></label>
                <input type="email" class="form-control" name="correo" id="correo" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Contraseña <span class="text-danger">*</span></label>
                <input type="password" class="form-control" name="password" id="password" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Rol <span class="text-danger">*</span></label>
                <select class="form-select" name="rol" id="rol" required>
                  <option value="">Seleccionar rol</option>
                  <option value="Administrador">Administrador</option>
                  <option value="Recepcionista">Recepcionista</option>
                  <option value="Peluquero">Peluquero</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label">Imagen URL</label>
                <input type="url" class="form-control" name="imagen" id="imagen" placeholder="https://ejemplo.com/imagen.jpg">
              </div>
              <div class="col-md-6 d-flex align-items-end">
                <div class="form-check form-switch">
                  <input class="form-check-input" type="checkbox" id="estado" name="estado" checked>
                  <label class="form-check-label" for="estado">Activo</label>
                </div>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
              <i class="bi bi-x-lg me-1"></i> Cancelar
            </button>
            <button type="submit" class="btn btn-primary" id="btnGuardar">
              <i class="bi bi-check-lg me-1"></i> Guardar Usuario
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.12.4/dist/sweetalert2.all.min.js"></script>
  <script>
    let usuarios = [];
    let usuarioEditando = null;

    document.addEventListener("DOMContentLoaded", function() {
      loadUsuarios();
      setupEventListeners();
    });

    function setupEventListeners() {
      document.getElementById('searchInput').addEventListener('input', debounce(filterUsuarios, 300));
      document.getElementById('rolFilter').addEventListener('change', filterUsuarios);
      document.getElementById('estadoFilter').addEventListener('change', filterUsuarios);
      document.getElementById('formUsuario').addEventListener('submit', handleSubmitUsuario);
    }

    async function loadUsuarios() {
      try {
        const res = await fetch("/api/usuarios");
        if (!res.ok) throw new Error('Error al cargar usuarios');
        
        const data = await res.json();
        usuarios = data;
        renderUsuarios();
      } catch (error) {
        console.error("Error:", error);
        showError("Error al cargar los usuarios");
      }
    }

    function renderUsuarios() {
      const tbody = document.getElementById("tbodyUsuarios");
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const rolFilter = document.getElementById('rolFilter').value;
      const estadoFilter = document.getElementById('estadoFilter').value;
      
      let filteredUsuarios = usuarios.filter(usuario => {
        if (searchTerm) {
          const nombre = (usuario.nombre || '').toLowerCase();
          const correo = (usuario.correo || '').toLowerCase();
          const rol = (usuario.rol || '').toLowerCase();
          if (!nombre.includes(searchTerm) && !correo.includes(searchTerm) && !rol.includes(searchTerm)) {
            return false;
          }
        }
        
        if (rolFilter && usuario.rol !== rolFilter) {
          return false;
        }
        
        if (estadoFilter !== '' && usuario.estado !== (estadoFilter === 'true')) {
          return false;
        }
        
        return true;
      });

      tbody.innerHTML = '';
      if (filteredUsuarios.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="7" class="text-center py-4">
              <i class="bi bi-person-gear fs-1 text-muted"></i>
              <p class="text-muted mt-2">No se encontraron usuarios</p>
            </td>
          </tr>
        `;
      } else {
        filteredUsuarios.forEach(usuario => {
          const row = createUsuarioRow(usuario);
          tbody.appendChild(row);
        });
      }

      document.getElementById('totalUsuarios').textContent = `${filteredUsuarios.length} usuarios`;
    }

    function createUsuarioRow(usuario) {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><span class="fw-semibold">#${usuario.id}</span></td>
        <td>
          <div class="d-flex align-items-center">
            <img src="${usuario.imagen || 'https://i.pravatar.cc/40'}" alt="Usuario" class="rounded-circle me-2" width="40" height="40" style="object-fit: cover;">
            <div>
              <div class="fw-semibold">${usuario.nombre}</div>
            </div>
          </div>
        </td>
        <td>
          <div>
            <div class="fw-semibold">${usuario.correo}</div>
          </div>
        </td>
        <td><span class="badge ${getRolBadgeClass(usuario.rol)}">${usuario.rol}</span></td>
        <td>
          <span class="badge ${usuario.estado ? 'bg-success' : 'bg-danger'}">
            ${usuario.estado ? 'Activo' : 'Inactivo'}
          </span>
        </td>
        <td>
          <span class="text-muted small">${new Date(usuario.fechaCreacion).toLocaleDateString()}</span>
        </td>
        <td class="text-center">
          <div class="btn-group btn-group-sm">
            <button class="btn btn-outline-primary" onclick="editarUsuario(${usuario.id})" title="Editar">
              <i class="bi bi-pencil"></i>
            </button>
            <button class="btn btn-outline-danger" onclick="eliminarUsuario(${usuario.id})" title="Eliminar">
              <i class="bi bi-trash"></i>
            </button>
          </div>
        </td>
      `;
      return tr;
    }

    function getRolBadgeClass(rol) {
      switch(rol) {
        case 'Administrador': return 'bg-danger';
        case 'Recepcionista': return 'bg-primary';
        case 'Peluquero': return 'bg-success';
        default: return 'bg-secondary';
      }
    }

    function filterUsuarios() {
      renderUsuarios();
    }

    function limpiarFiltros() {
      document.getElementById('searchInput').value = '';
      document.getElementById('rolFilter').value = '';
      document.getElementById('estadoFilter').value = '';
      renderUsuarios();
    }

    async function handleSubmitUsuario(e) {
      e.preventDefault();
      
      const formData = new FormData(e.target);
      const usuarioData = {
        nombre: formData.get('nombre'),
        correo: formData.get('correo'),
        password: formData.get('password'),
        rol: formData.get('rol'),
        imagen: formData.get('imagen'),
        estado: document.getElementById('estado').checked
      };
      
      try {
        const url = usuarioEditando ? `/api/usuarios/${usuarioEditando}` : '/api/usuarios';
        const method = usuarioEditando ? 'PUT' : 'POST';
        
        const response = await fetch(url, {
          method: method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(usuarioData)
        });

        if (!response.ok) throw new Error('Error al guardar usuario');

        showSuccess(usuarioEditando ? 'Usuario actualizado correctamente' : 'Usuario registrado correctamente');
        
        bootstrap.Modal.getInstance(document.getElementById('usuarioModal')).hide();
        document.getElementById('formUsuario').reset();
        usuarioEditando = null;
        document.getElementById('modalTitle').textContent = 'Nuevo Usuario';
        document.getElementById('btnGuardar').innerHTML = '<i class="bi bi-check-lg me-1"></i> Guardar Usuario';
        loadUsuarios();
        
      } catch (error) {
        console.error('Error:', error);
        showError('Error al guardar el usuario');
      }
    }

    function editarUsuario(id) {
      const usuario = usuarios.find(u => u.id === id);
      if (!usuario) return;
      
      usuarioEditando = id;
      document.getElementById('modalTitle').textContent = 'Editar Usuario';
      document.getElementById('btnGuardar').innerHTML = '<i class="bi bi-check-lg me-1"></i> Actualizar Usuario';
      
      document.getElementById('nombre').value = usuario.nombre;
      document.getElementById('correo').value = usuario.correo;
      document.getElementById('password').value = ''; // No mostrar contraseña
      document.getElementById('rol').value = usuario.rol;
      document.getElementById('imagen').value = usuario.imagen || '';
      document.getElementById('estado').checked = usuario.estado;
      
      new bootstrap.Modal(document.getElementById('usuarioModal')).show();
    }

    async function eliminarUsuario(id) {
      const usuario = usuarios.find(u => u.id === id);
      if (!usuario) return;

      const result = await Swal.fire({
        title: '¿Estás seguro?',
        text: `Se eliminará el usuario ${usuario.nombre}`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#d33',
        cancelButtonColor: '#3085d6',
        confirmButtonText: 'Sí, eliminar',
        cancelButtonText: 'Cancelar'
      });

      if (result.isConfirmed) {
        try {
          const response = await fetch(`/api/usuarios/${id}`, { method: 'DELETE' });
          if (!response.ok) throw new Error('Error al eliminar usuario');

          showSuccess('Usuario eliminado correctamente');
          loadUsuarios();
        } catch (error) {
          console.error('Error:', error);
          showError('Error al eliminar el usuario');
        }
      }
    }

    function exportarUsuarios() {
      showInfo('Función de exportación en desarrollo');
    }

    function debounce(func, wait) {
      let timeout;
      return function executedFunction(...args) {
        const later = () => {
          clearTimeout(timeout);
          func(...args);
        };
        clearTimeout(timeout);
        timeout = setTimeout(later, wait);
      };
    }

    function showSuccess(message) {
      Swal.fire({
        title: '¡Éxito!',
        text: message,
        icon: 'success',
        timer: 2000,
        showConfirmButton: false
      });
    }

    function showError(message) {
      Swal.fire({
        title: 'Error',
        text: message,
        icon: 'error'
      });
    }

    function showInfo(message) {
      Swal.fire({
        title: 'Información',
        text: message,
        icon: 'info'
      });
    }
  </script>
</body>
</html>
