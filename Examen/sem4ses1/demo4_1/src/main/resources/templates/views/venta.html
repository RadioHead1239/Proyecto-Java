<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Ventas Veterinarias · VetCare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.12.4/dist/sweetalert2.min.css" rel="stylesheet">
  <link href="/css/global.css" rel="stylesheet">
  
    
  <style>
    :root {
      --sidebar-bg: linear-gradient(180deg, #84cddb, #b4dadf);
      --sidebar-hover: rgba(255, 255, 255, 0.15);
      --sidebar-active: linear-gradient(135deg, #4facfe, #00f2fe);
      --text-color: #ffffff;
    }
  
    /* Sidebar */
    .sidebar {
      position: fixed;
      inset-block: 0;
      inset-inline-start: 0;
      width: 260px;
      background: var(--sidebar-bg);
      color: var(--text-color);
      z-index: 1030;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      border-right: 3px solid rgba(255,255,255,0.1);
    }
  
    /* Logo */
    .brand-logo {
      width: 90%;
      border-radius: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      transition: transform .3s ease;
    }
    .brand-logo:hover {
      transform: scale(1.05);
    }
  
    /* Menú */
    .sidebar .nav-link {
      color: var(--text-color);
      border-radius: .6rem;
      padding: .65rem 1rem;
      display: flex;
      align-items: center;
      gap: .6rem;
      transition: all .2s;
      font-weight: 500;
    }
  
    .sidebar .nav-link:hover {
      background: var(--sidebar-hover);
    }
  
    .sidebar .nav-link.active {
      background: var(--sidebar-active);
      color: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
    }
  
    /* Footer */
    .sidebar-footer {
      padding: 1rem;
      font-size: .85rem;
      color: rgba(255,255,255,.8);
      border-top: 1px solid rgba(255,255,255,.2);
    }
  </style>
  
</head>
<body>
  
  <aside class="sidebar d-flex flex-column p-3">
    
    <div class="brand mb-4 text-center">
      <img src="https://marketplace.canva.com/EAGre3wkiKc/1/0/1600w/canva-logotipo-veterinaria-ilustrado-lindo-azul-aqua-beige-g5Mq7lvYdmg.jpg" 
           alt="VetCare Logo" 
           class="brand-logo">
    </div>
  
    
    <ul class="nav flex-column gap-1">
      <li><a href="/dashboard" class="nav-link"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
      <li><a href="/cliente" class="nav-link"><i class="bi bi-people me-2"></i>Clientes</a></li>
      <li><a href="/mascota" class="nav-link"><i class="bi bi-bag-heart me-2"></i>Mascotas</a></li>
      <li><a href="/cita" class="nav-link"><i class="bi bi-calendar2-week me-2"></i>Citas</a></li>
      <li><a href="/venta" class="nav-link"><i class="bi bi-receipt me-2"></i>Ventas</a></li>
      <li><a href="/producto" class="nav-link"><i class="bi bi-box-seam me-2"></i>Productos</a></li>
      <li><a href="/usuario" class="nav-link"><i class="bi bi-person-gear me-2"></i>Usuarios</a></li>
      <li><a href="/pago" class="nav-link"><i class="bi bi-cash-coin me-2"></i>Pagos</a></li>
      <li><a href="/servicio" class="nav-link"><i class="bi bi-scissors me-2"></i>Servicios</a></li>
    </ul>
  
    
    <div class="sidebar-footer mt-auto text-center small">
      © 2025 VetCare
    </div>
  </aside>
  

  
  <main class="content">
    <div class="topbar d-flex align-items-center justify-content-between">
      <div>
        <h5 class="mb-0"><i class="bi bi-cart me-2"></i>Gestión de Ventas</h5>
        <small class="text-muted">Administra las ventas y transacciones</small>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-outline-primary btn-sm" onclick="exportarVentas()">
          <i class="bi bi-download me-1"></i> Exportar
        </button>
        <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#ventaModal">
          <i class="bi bi-plus-lg me-1"></i> Nueva Venta
        </button>
      </div>
    </div>

    <div class="container-fluid py-4">
      
      <div class="card mb-4">
        <div class="card-body">
          <div class="row g-3">
            <div class="col-md-3">
              <label class="form-label">Buscar venta</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-search"></i></span>
                <input type="text" class="form-control" id="searchInput" placeholder="Cliente, producto, monto...">
              </div>
            </div>
            <div class="col-md-2">
              <label class="form-label">Estado</label>
              <select class="form-select" id="estadoFilter">
                <option value="">Todos</option>
                <option value="Pendiente">Pendiente</option>
                <option value="Completada">Completada</option>
                <option value="Cancelada">Cancelada</option>
              </select>
            </div>
            <div class="col-md-2">
              <label class="form-label">Fecha desde</label>
              <input type="date" class="form-control" id="fechaDesde">
            </div>
            <div class="col-md-2">
              <label class="form-label">Fecha hasta</label>
              <input type="date" class="form-control" id="fechaHasta">
            </div>
            <div class="col-md-2">
              <label class="form-label">Monto mínimo</label>
              <input type="number" class="form-control" id="montoMin" step="0.01" min="0">
            </div>
            <div class="col-md-1 d-flex align-items-end">
              <button class="btn btn-outline-secondary w-100" onclick="limpiarFiltros()">
                <i class="bi bi-arrow-clockwise"></i>
              </button>
            </div>
          </div>
        </div>
      </div>

      
      <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
          <h6 class="mb-0"><i class="bi bi-list-ul me-2"></i>Lista de Ventas</h6>
          <span class="badge bg-primary" id="totalVentas">0 ventas</span>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th width="5%">ID</th>
                  <th width="20%">Cliente</th>
                  <th width="15%">Productos</th>
                  <th width="15%">Total</th>
                  <th width="15%">Fecha</th>
                  <th width="10%">Estado</th>
                  <th width="10%">Usuario</th>
                  <th width="10%" class="text-center">Acciones</th>
                </tr>
              </thead>
              <tbody id="tbodyVentas">
                
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>

  
  <div class="modal fade" id="ventaModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered">
      <div class="modal-content">
        <form id="formVenta">
          <div class="modal-header bg-gradient text-white">
            <h5 class="modal-title">
              <i class="bi bi-cart me-2"></i>
              <span id="modalTitle">Nueva Venta</span>
            </h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Cliente <span class="text-danger">*</span></label>
                <select class="form-select" name="idCliente" id="idCliente" required>
                  <option value="">Seleccionar cliente</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label">Estado</label>
                <select class="form-select" name="estado" id="estado">
                  <option value="Pendiente">Pendiente</option>
                  <option value="Completada">Completada</option>
                  <option value="Cancelada">Cancelada</option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label">Productos</label>
                <div class="card">
                  <div class="card-body">
                    <div class="row g-2 mb-3">
                      <div class="col-md-4">
                        <select class="form-select" id="productoSelect">
                          <option value="">Seleccionar producto</option>
                        </select>
                      </div>
                      <div class="col-md-2">
                        <input type="number" class="form-control" id="cantidadInput" placeholder="Cantidad" min="1" value="1">
                      </div>
                      <div class="col-md-3">
                        <input type="number" class="form-control" id="precioInput" placeholder="Precio" step="0.01" min="0" readonly>
                      </div>
                      <div class="col-md-3">
                        <button type="button" class="btn btn-outline-primary w-100" onclick="agregarProducto()">
                          <i class="bi bi-plus"></i> Agregar
                        </button>
                      </div>
                    </div>
                    <div id="productosList" class="mb-3">
                      
                    </div>
                    <div class="d-flex justify-content-between align-items-center">
                      <strong>Total: S/ <span id="totalVenta">0.00</span></strong>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
              <i class="bi bi-x-lg me-1"></i> Cancelar
            </button>
            <button type="submit" class="btn btn-primary" id="btnGuardar">
              <i class="bi bi-check-lg me-1"></i> Guardar Venta
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.12.4/dist/sweetalert2.all.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="/js/utils.js"></script>
  <script>
    let ventas = [];
    let clientes = [];
    let productos = [];
    let ventaEditando = null;
    let productosVenta = [];

    document.addEventListener("DOMContentLoaded", function() {
      loadVentas();
      loadClientes();
      loadProductos();
      setupEventListeners();
    });

    function setupEventListeners() {
      document.getElementById('searchInput').addEventListener('input', debounce(filterVentas, 300));
      document.getElementById('estadoFilter').addEventListener('change', filterVentas);
      document.getElementById('fechaDesde').addEventListener('change', filterVentas);
      document.getElementById('fechaHasta').addEventListener('change', filterVentas);
      document.getElementById('montoMin').addEventListener('input', filterVentas);
      document.getElementById('formVenta').addEventListener('submit', handleSubmitVenta);
      document.getElementById('productoSelect').addEventListener('change', updatePrecio);
      document.getElementById('cantidadInput').addEventListener('input', updateSubtotal);
    }

    async function loadVentas() {
      try {
        const res = await fetch("/api/ventas");
        if (!res.ok) throw new Error('Error al cargar ventas');
        
        const data = await res.json();
        ventas = data;
        renderVentas();
      } catch (error) {
        console.error("Error:", error);
        showError("Error al cargar las ventas");
      }
    }

    async function loadClientes() {
      try {
        const res = await fetch("/api/clientes");
        if (!res.ok) throw new Error('Error al cargar clientes');
        
        const data = await res.json();
        clientes = data;
        populateClientesSelect();
      } catch (error) {
        console.error("Error:", error);
      }
    }

    async function loadProductos() {
      try {
        const res = await fetch("/api/productos");
        if (!res.ok) throw new Error('Error al cargar productos');
        
        const data = await res.json();
        productos = data;
        populateProductosSelect();
      } catch (error) {
        console.error("Error:", error);
      }
    }

    function populateClientesSelect() {
      const select = document.getElementById('idCliente');
      select.innerHTML = '<option value="">Seleccionar cliente</option>';
      
      const clientePublico = clientes.find(c => c.nombre === 'Público en' && c.apellido === 'General');
      if (clientePublico) {
        const option = document.createElement('option');
        option.value = clientePublico.id;
        option.textContent = `${clientePublico.nombre} ${clientePublico.apellido}`;
        option.selected = true;
        select.appendChild(option);
      }
      
      clientes.forEach(cliente => {
        if (!(cliente.nombre === 'Público en' && cliente.apellido === 'General')) {
          const option = document.createElement('option');
          option.value = cliente.id;
          option.textContent = `${cliente.nombre} ${cliente.apellido}`;
          select.appendChild(option);
        }
      });
    }

    function populateProductosSelect() {
      const select = document.getElementById('productoSelect');
      select.innerHTML = '<option value="">Seleccionar producto</option>';
      productos.forEach(producto => {
        if (producto.activo && producto.stock > 0) {
          const option = document.createElement('option');
          option.value = producto.id;
          option.textContent = `${producto.nombre} - S/ ${producto.precio} (Stock: ${producto.stock})`;
          option.dataset.precio = producto.precio;
          option.dataset.stock = producto.stock;
          select.appendChild(option);
        }
      });
    }

    function updatePrecio() {
      const productoId = document.getElementById('productoSelect').value;
      const precioInput = document.getElementById('precioInput');
      
      if (productoId) {
        const producto = productos.find(p => p.id == productoId);
        if (producto) {
          precioInput.value = producto.precio;
        }
      } else {
        precioInput.value = '';
      }
    }

    function updateSubtotal() {
      const cantidad = parseInt(document.getElementById('cantidadInput').value) || 0;
      const precio = parseFloat(document.getElementById('precioInput').value) || 0;
      const subtotal = cantidad * precio;
    }

    function agregarProducto() {
      const productoId = document.getElementById('productoSelect').value;
      const cantidad = parseInt(document.getElementById('cantidadInput').value) || 1;
      const precio = parseFloat(document.getElementById('precioInput').value) || 0;
      
      if (!productoId || cantidad <= 0 || precio <= 0) {
        showError('Por favor selecciona un producto válido');
        return;
      }

      const producto = productos.find(p => p.id == productoId);
      if (!producto) return;

      if (cantidad > producto.stock) {
        showError('No hay suficiente stock disponible');
        return;
      }

      const productoExistente = productosVenta.find(p => p.id === productoId);
      if (productoExistente) {
        productoExistente.cantidad += cantidad;
        productoExistente.subtotal = productoExistente.cantidad * productoExistente.precio;
      } else {
        productosVenta.push({
          id: productoId,
          nombre: producto.nombre,
          precio: precio,
          cantidad: cantidad,
          subtotal: cantidad * precio
        });
      }

      renderProductosList();
      updateTotal();
      limpiarProductoForm();
    }

    function renderProductosList() {
      const container = document.getElementById('productosList');
      
      if (productosVenta.length === 0) {
        container.innerHTML = '<p class="text-muted">No hay productos agregados</p>';
        return;
      }

      container.innerHTML = productosVenta.map((producto, index) => `
        <div class="d-flex justify-content-between align-items-center border-bottom py-2">
          <div>
            <strong>${producto.nombre}</strong><br>
            <small class="text-muted">Cantidad: ${producto.cantidad} x S/ ${producto.precio}</small>
          </div>
          <div class="d-flex align-items-center gap-2">
            <span class="fw-bold">S/ ${producto.subtotal.toFixed(2)}</span>
            <button type="button" class="btn btn-outline-danger btn-sm" onclick="removerProducto(${index})">
              <i class="bi bi-trash"></i>
            </button>
          </div>
        </div>
      `).join('');
    }

    function removerProducto(index) {
      productosVenta.splice(index, 1);
      renderProductosList();
      updateTotal();
    }

    function updateTotal() {
      const total = productosVenta.reduce((sum, producto) => sum + producto.subtotal, 0);
      document.getElementById('totalVenta').textContent = total.toFixed(2);
    }

    function limpiarProductoForm() {
      document.getElementById('productoSelect').value = '';
      document.getElementById('cantidadInput').value = '1';
      document.getElementById('precioInput').value = '';
    }

    function renderVentas() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const estadoFilter = document.getElementById('estadoFilter').value;
      const fechaDesde = document.getElementById('fechaDesde').value;
      const fechaHasta = document.getElementById('fechaHasta').value;
      const montoMin = parseFloat(document.getElementById('montoMin').value) || 0;
      
      let filteredVentas = ventas.filter(venta => {
        if (searchTerm) {
          const cliente = (venta.cliente || '').toLowerCase();
          const total = venta.total.toString();
          if (!cliente.includes(searchTerm) && !total.includes(searchTerm)) {
            return false;
          }
        }
        
        if (estadoFilter && venta.estado !== estadoFilter) {
          return false;
        }
        
        if (fechaDesde) {
          const fechaVenta = new Date(venta.fecha).toISOString().split('T')[0];
          if (fechaVenta < fechaDesde) {
            return false;
          }
        }
        
        if (fechaHasta) {
          const fechaVenta = new Date(venta.fecha).toISOString().split('T')[0];
          if (fechaVenta > fechaHasta) {
            return false;
          }
        }
        
        if (montoMin > 0 && venta.total < montoMin) {
          return false;
        }
        
        return true;
      });

      renderVentasTable(filteredVentas);
    }

    function renderVentasTable(ventas) {
      const tbody = document.getElementById("tbodyVentas");
      
      if (ventas.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="8" class="text-center py-4">
              <i class="bi bi-cart fs-1 text-muted"></i>
              <p class="text-muted mt-2">No se encontraron ventas</p>
            </td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = ventas.map(venta => `
        <tr>
          <td><span class="fw-semibold">#${venta.id}</span></td>
          <td>
            <div>
              <div class="fw-semibold">${venta.cliente || '-'}</div>
            </div>
          </td>
          <td>
            <span class="badge bg-info">${venta.detalles ? venta.detalles.length + ' productos' : 'Sin productos'}</span>
          </td>
          <td><span class="fw-bold text-success">S/ ${venta.total}</span></td>
          <td>
            <div>
              <div class="fw-semibold">${new Date(venta.fecha).toLocaleDateString()}</div>
              <div class="small text-muted">${new Date(venta.fecha).toLocaleTimeString()}</div>
            </div>
          </td>
          <td><span class="badge ${getEstadoBadgeClass(venta.estado)}">${venta.estado}</span></td>
          <td><span class="text-muted">${venta.usuario || '-'}</span></td>
          <td class="text-center">
            <div class="btn-group btn-group-sm">
              <button class="btn btn-outline-primary" onclick="editarVenta(${venta.id})" title="Editar">
                <i class="bi bi-pencil"></i>
              </button>
              <button class="btn btn-outline-info" onclick="verDetalles(${venta.id})" title="Ver PDF">
                <i class="bi bi-file-pdf"></i>
              </button>
              <button class="btn btn-outline-success" onclick="generarComprobante(${venta.id})" title="Generar Comprobante">
                <i class="bi bi-receipt"></i>
              </button>
              <button class="btn btn-outline-warning" onclick="descargarPDF(${venta.id})" title="Descargar PDF">
                <i class="bi bi-download"></i>
              </button>
              <button class="btn btn-outline-danger" onclick="eliminarVenta(${venta.id})" title="Eliminar">
                <i class="bi bi-trash"></i>
              </button>
            </div>
          </td>
        </tr>
      `).join('');

      document.getElementById('totalVentas').textContent = `${ventas.length} ventas`;
    }

    function getEstadoBadgeClass(estado) {
      switch(estado) {
        case 'Completada': return 'bg-success';
        case 'Pendiente': return 'bg-warning';
        case 'Cancelada': return 'bg-danger';
        default: return 'bg-secondary';
      }
    }

    function filterVentas() {
      renderVentas();
    }

    function limpiarFiltros() {
      document.getElementById('searchInput').value = '';
      document.getElementById('estadoFilter').value = '';
      document.getElementById('fechaDesde').value = '';
      document.getElementById('fechaHasta').value = '';
      document.getElementById('montoMin').value = '';
      renderVentas();
    }

    async function handleSubmitVenta(e) {
      e.preventDefault();
      
      if (productosVenta.length === 0) {
        showError('Debe agregar al menos un producto');
        return;
      }

      const formData = new FormData(e.target);
      const ventaData = {
        idCliente: parseInt(formData.get('idCliente')),
        estado: formData.get('estado'),
        total: productosVenta.reduce((sum, producto) => sum + producto.subtotal, 0),
        detalles: productosVenta.map(producto => ({
          idProducto: producto.id,
          cantidad: producto.cantidad,
          precioUnitario: producto.precio,
          subtotal: producto.subtotal
        }))
      };
      
      try {
        const url = ventaEditando ? `/api/ventas/${ventaEditando}` : '/api/ventas';
        const method = ventaEditando ? 'PUT' : 'POST';
        
        const response = await fetch(url, {
          method: method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(ventaData)
        });

        if (!response.ok) throw new Error('Error al guardar venta');

        showSuccess(ventaEditando ? 'Venta actualizada correctamente' : 'Venta registrada correctamente');
        
        bootstrap.Modal.getInstance(document.getElementById('ventaModal')).hide();
        document.getElementById('formVenta').reset();
        productosVenta = [];
        renderProductosList();
        updateTotal();
        ventaEditando = null;
        document.getElementById('modalTitle').textContent = 'Nueva Venta';
        loadVentas();
        
      } catch (error) {
        console.error('Error:', error);
        showError('Error al guardar la venta');
      }
    }

    async function editarVenta(id) {
      try {
        const response = await fetch(`/api/ventas/${id}`);
        if (!response.ok) throw new Error('Error al cargar venta');
        
        const venta = await response.json();
        if (!venta) return;
        
        ventaEditando = id;
        document.getElementById('modalTitle').textContent = 'Editar Venta';
        
        document.getElementById('idCliente').value = venta.idCliente;
        document.getElementById('estado').value = venta.estado;
        
        productosVenta = [];
        if (venta.detalles && venta.detalles.length > 0) {
          venta.detalles.forEach(detalle => {
            productosVenta.push({
              id: detalle.idProducto,
              nombre: detalle.producto,
              precio: parseFloat(detalle.precioUnitario),
              cantidad: detalle.cantidad,
              subtotal: parseFloat(detalle.subtotal)
            });

    async function generarPDFVentaA4(venta, descargarDirecto = false) {
      try {

        const lightGray = [245, 245, 245];
        const darkGray = [64, 64, 64];

        doc.setFillColor(...primaryColor);
        doc.rect(0, 0, 210, 25, 'F');

        doc.setFillColor(255, 255, 255);
        doc.rect(15, 5, 8, 8, 'F');
        doc.setFillColor(...primaryColor);
        doc.rect(17, 7, 4, 4, 'F');
        doc.setFillColor(255, 255, 255);
        doc.rect(18, 8, 2, 2, 'F');

        doc.setTextColor(255, 255, 255);
        doc.setFontSize(24);
        doc.setFont('helvetica', 'bold');
        doc.text('COMPROBANTE DE PAGO', 30, 15);

        doc.setTextColor(...textColor);
        doc.setFontSize(10);
        doc.setFont('helvetica', 'normal');
        doc.text('VetCare - Veterinaria y Clínica Animal', 20, 35);
        doc.text('RUC: 20123456789', 20, 40);
        doc.text('Av. Javier Prado Este 123, San Isidro, Lima', 20, 45);
        doc.text('Tel: (01) 234-5678 | Email: info@vetcare.com', 20, 50);

        const infoX = 105;
        doc.setFontSize(12);
        doc.setFont('helvetica', 'bold');
        doc.text(`N° Comprobante: ${venta.id}`, infoX, 35);

        const fecha = new Date(venta.fecha).toLocaleDateString('es-ES', {
          year: 'numeric',
          month: 'long',
          day: 'numeric'
        });
        doc.text(`Fecha: ${fecha}`, infoX, 40);
        doc.text(`Cliente: ${venta.cliente || 'Público en General'}`, infoX, 45);
        doc.text(`Estado: ${venta.estado}`, infoX, 50);

        doc.setDrawColor(...primaryColor);
        doc.setLineWidth(1);
        doc.line(20, 55, 190, 55);

        doc.setFontSize(14);
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(...textColor);
        doc.text('DETALLE DE PRODUCTOS Y SERVICIOS', 105, 65, { align: 'center' });

        const tableStartX = 20;
        const tableWidth = 170;
        doc.setFillColor(...lightGray);
        doc.rect(tableStartX, 70, tableWidth, 10, 'F');

        const conceptoX = 10;
        const cantidadX = 100;
        const precioX = 120; 
        const totalX = 150;
        doc.setFontSize(10);
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(...darkGray);
        doc.text('CONCEPTO', conceptoX, 77);
        doc.text('CANT.', cantidadX, 77);
        doc.text('PRECIO UNIT.', precioX, 77);
        doc.text('TOTAL', totalX, 77);


        let yPosition = 85;
        let subtotal = 0;
        const iva = 0.18;

        console.log('Venta completa recibida:', venta);
        console.log('Detalles de la venta:', venta.detalles);

        if (venta.detalles && venta.detalles.length > 0) {
          venta.detalles.forEach((detalle, index) => {
            console.log('Procesando detalle:', detalle);
            doc.setFont('helvetica', 'normal');
            doc.setTextColor(...textColor);

            const nombreProducto = detalle.producto || detalle.nombreProducto || 'Producto';
            const cantidad = detalle.cantidad;
            const precioUnitario = parseFloat(detalle.precioUnitario || detalle.precio);
            const total = parseFloat(detalle.subtotal || detalle.total);

            doc.text(nombreProducto, conceptoX, yPosition);
            doc.text(cantidad.toString(), cantidadX, yPosition);

            doc.text(`S/ ${total.toFixed(2)}`, totalX, yPosition);


            subtotal += total;
            yPosition += 6;

              doc.setDrawColor(200, 200, 200);
              doc.line(tableStartX, yPosition - 2, tableStartX + tableWidth, yPosition - 2);
            }
          });
        } else {
          console.log('No hay detalles en la venta');
          doc.setFont('helvetica', 'italic');
          doc.text('No hay productos registrados', conceptoX, yPosition);
          yPosition += 6;
        }

        doc.setDrawColor(...primaryColor);
        doc.setLineWidth(0.5);
        doc.line(tableStartX, yPosition, tableStartX + tableWidth, yPosition);

        const subtotalCalculado = subtotal;
        const ivaCalculado = 0;
        const totalCalculado = subtotalCalculado;

        const totalsX = 105;

        yPosition += 10;

        doc.setFont('helvetica', 'normal');
        doc.text('Subtotal:', totalsX, yPosition);
        doc.text(`S/ ${subtotalCalculado.toFixed(2)}`, totalsX + 40, yPosition);

        yPosition += 6;
        doc.text('IVA:', totalsX, yPosition);
        doc.text(`S/ ${ivaCalculado.toFixed(2)}`, totalsX + 40, yPosition);

        yPosition += 8;
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(12);
        doc.text('TOTAL:', totalsX, yPosition);
        doc.text(`S/ ${totalCalculado.toFixed(2)}`, totalsX + 40, yPosition);

        yPosition += 20;
        doc.setFillColor(...lightGray);
        doc.rect(20, yPosition, 100, 15, 'F');

        doc.setFontSize(10);
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(...primaryColor);
        doc.text('TOTAL COMPROBANTE', 25, yPosition + 8);

        doc.setFontSize(8);
        doc.setFont('helvetica', 'normal');
        doc.setTextColor(...textColor);
        doc.text('Este comprobante no tiene validez fiscal ante SUNAT', 25, yPosition + 12);

        yPosition += 30;
        doc.setFontSize(8);
        doc.setFont('helvetica', 'normal');
        doc.setTextColor(100, 100, 100);
        doc.text('Gracias por su compra', 20, yPosition);
        doc.text('VetCare - Cuidando a tus mascotas', 20, yPosition + 5);

        const nombreArchivo = `Comprobante_${venta.id}_${new Date().toISOString().split('T')[0]}.pdf`;
        
        if (descargarDirecto) {
          doc.save(nombreArchivo);
          showSuccess('Comprobante de pago descargado exitosamente');
        } else {
          const pdfBlob = doc.output('blob');
          
          const { value: accion } = await Swal.fire({
            title: 'Comprobante Generado',
            text: '¿Qué deseas hacer con el comprobante?',
            icon: 'success',
            showCancelButton: true,
            confirmButtonText: 'Enviar por Email',
            cancelButtonText: 'Solo Descargar',
            showDenyButton: true,
            denyButtonText: 'Cancelar',
            denyButtonColor: '#6c757d'
          });

          if (accion === undefined) return; 

          if (accion) {
            await enviarComprobantePorEmail(venta, pdfBlob, nombreArchivo);
          } else {
            doc.save(nombreArchivo);
            showSuccess('Comprobante de pago generado exitosamente');
          }
        }

      } catch (error) {
        console.error('Error al generar PDF:', error);
        showError('Error al generar el comprobante');
      }
    }

    async function enviarComprobantePorEmail(venta, pdfBlob, nombreArchivo) {
      try {
        const { value: emailDestino } = await Swal.fire({
          title: 'Enviar Comprobante por Email',
          input: 'email',
          inputLabel: 'Email del destinatario',
          inputValue: venta.cliente ? `${venta.cliente.toLowerCase().replace(/\s+/g, '')}@gmail.com` : '',
          inputPlaceholder: 'ejemplo@email.com',
          showCancelButton: true,
          confirmButtonText: 'Enviar',
          cancelButtonText: 'Cancelar',
          inputValidator: (value) => {
            if (!value) {
              return 'Debes ingresar un email válido';
            }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value)) {
              return 'Debes ingresar un email válido';
            }
          }
        });

        if (!emailDestino) return;

        // Mostrar loading
        Swal.fire({
          title: 'Enviando...',
          text: 'Preparando el envío del comprobante',
          allowOutsideClick: false,
          showConfirmButton: false,
          didOpen: () => {
            Swal.showLoading();
          }
        });

        // Convertir PDF a base64
        const reader = new FileReader();
        reader.onload = async function() {
          const base64Pdf = reader.result.split(',')[1];
          
          try {
            // Enviar email usando backend
            await enviarEmailGmail(emailDestino, venta, base64Pdf, nombreArchivo);
            
            Swal.fire({
              title: '¡Enviado!',
              text: `Comprobante enviado exitosamente a ${emailDestino}`,
              icon: 'success',
              confirmButtonText: 'OK'
            });
          } catch (error) {
            console.error('Error al enviar email:', error);
            console.error('Error details:', error.message);
            
            let errorMessage = 'No se pudo enviar el email. Intenta nuevamente.';
            if (error.message) {
              errorMessage = `Error: ${error.message}`;
            }
            
            Swal.fire({
              title: 'Error al Enviar Email',
              html: `
                <div style="text-align: left;">
                  <p><strong>Error:</strong> ${errorMessage}</p>
                  <p><strong>Posibles causas:</strong></p>
                  <ul style="text-align: left; margin: 10px 0;">
                    <li>Verificar conexión a internet</li>
                    <li>Credenciales de Gmail incorrectas</li>
                    <li>Email de destino inválido</li>
                    <li>Problema con el servidor SMTP</li>
                  </ul>
                </div>
              `,
              icon: 'error',
              confirmButtonText: 'OK',
              width: 500
            });
          }
        };
        
        reader.readAsDataURL(pdfBlob);
        
      } catch (error) {
        console.error('Error:', error);
        showError('Error al preparar el envío del email');
      }
    }

    // Función para enviar email usando backend
    async function enviarEmailGmail(emailDestino, venta, base64Pdf, nombreArchivo) {
      const fecha = new Date(venta.fecha).toLocaleDateString('es-ES', {
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });

      const emailData = {
        to: emailDestino,
        subject: `Comprobante de Pago #${venta.id} - VetCare`,
        venta: {
          id: venta.id,
          fecha: fecha,
          cliente: venta.cliente || 'Público en General',
          estado: venta.estado,
          total: venta.total
        },
        pdfBase64: base64Pdf,
        pdfName: nombreArchivo
      };

      const response = await fetch('/api/email/enviar-email', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(emailData)
      });

      if (!response.ok) {
        let errorMessage = 'Error al enviar email';
        try {
          const errorData = await response.json();
          errorMessage = errorData.message || errorMessage;
        } catch (e) {
          const errorText = await response.text();
          errorMessage = errorText || errorMessage;
        }
        throw new Error(errorMessage);
      }
      const result = await response.json();
      if (!result.success) {
        throw new Error(result.message || 'Error desconocido');
      }
      return result;
    }

    async function generarComprobante(id) {
      try {
        const venta = ventas.find(v => v.id === id);
        if (!venta) {
          showError('Venta no encontrada');
          return;
        }

        const response = await fetch(`/api/ventas/${id}`);
        if (!response.ok) throw new Error('Error al cargar detalles de la venta');
        
        const ventaCompleta = await response.json();
        
        generarPDFVentaA4(ventaCompleta);
        
      } catch (error) {
        console.error('Error al generar comprobante:', error);
        showError('Error al generar el comprobante');
      }
    }

    async function eliminarVenta(id) {
      const venta = ventas.find(v => v.id === id);
      if (!venta) return;

      const result = await Swal.fire({
        title: '¿Estás seguro?',
        text: `Se eliminará la venta #${venta.id}`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#d33',
        cancelButtonColor: '#3085d6',
        confirmButtonText: 'Sí, eliminar',
        cancelButtonText: 'Cancelar'
      });

      if (result.isConfirmed) {
        try {
          const response = await fetch(`/api/ventas/${id}`, { method: 'DELETE' });
          if (!response.ok) throw new Error('Error al eliminar venta');

          showSuccess('Venta eliminada correctamente');
          loadVentas();
        } catch (error) {
          console.error('Error:', error);
          showError('Error al eliminar la venta');
        }
      }
    }

    function exportarVentas() {
      if (ventas.length === 0) {
        showWarning('No hay ventas para exportar');
        return;
      }
      
      Swal.fire({
        title: 'Exportar Ventas',
        text: 'Selecciona el rango de fechas para exportar',
        html: `
          <div class="mb-3">
            <label for="fechaInicio" class="form-label">Fecha Inicio:</label>
            <input type="date" id="fechaInicio" class="form-control">
          </div>
          <div class="mb-3">
            <label for="fechaFin" class="form-label">Fecha Fin:</label>
            <input type="date" id="fechaFin" class="form-control">
          </div>
        `,
        showCancelButton: true,
        confirmButtonText: 'Exportar PDF',
        cancelButtonText: 'Cancelar',
        preConfirm: () => {
          const fechaInicio = document.getElementById('fechaInicio').value;
          const fechaFin = document.getElementById('fechaFin').value;
          
          if (!fechaInicio || !fechaFin) {
            Swal.showValidationMessage('Por favor selecciona ambas fechas');
            return false;
          }
          
          return { fechaInicio, fechaFin };
        }
      }).then((result) => {
        if (result.isConfirmed) {
          exportarVentasPorFecha(result.value.fechaInicio, result.value.fechaFin);
        }
      });
    }
    
    async function exportarVentasPorFecha(fechaInicio, fechaFin) {
      try {
        const ventasFiltradas = ventas.filter(venta => {
          const fechaVenta = new Date(venta.fecha);
          const inicio = new Date(fechaInicio);
          const fin = new Date(fechaFin);
          fin.setHours(23, 59, 59, 999);
          return fechaVenta >= inicio && fechaVenta <= fin;
        });
        
        if (ventasFiltradas.length === 0) {
          showWarning('No hay ventas en el rango de fechas seleccionado');
          return;
        }
        
        generarPDFVentas(ventasFiltradas, fechaInicio, fechaFin);
        
      } catch (error) {
        console.error('Error al exportar ventas:', error);
        showError('Error al exportar las ventas');
      }
    }
    
    function generarPDFVentas(ventas, fechaInicio, fechaFin) {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      
      doc.setFontSize(16);
      doc.setFont('helvetica', 'bold');
      doc.text('REPORTE DE VENTAS', 105, 20, { align: 'center' });
      
      doc.setFontSize(12);
      doc.setFont('helvetica', 'normal');
      doc.text(`Período: ${fechaInicio} al ${fechaFin}`, 105, 30, { align: 'center' });
      doc.text(`Total de ventas: ${ventas.length}`, 105, 40, { align: 'center' });
      
      let yPosition = 60;
      let totalGeneral = 0;
      
      ventas.forEach((venta, index) => {
        if (yPosition > 250) {
          doc.addPage();
          yPosition = 20;
        }
        
        doc.setFontSize(10);
        doc.setFont('helvetica', 'bold');
        doc.text(`Venta #${venta.id}`, 20, yPosition);
        
        doc.setFont('helvetica', 'normal');
        doc.text(`Cliente: ${venta.cliente}`, 20, yPosition + 8);
        doc.text(`Fecha: ${new Date(venta.fecha).toLocaleDateString()}`, 20, yPosition + 16);
        doc.text(`Total: S/ ${parseFloat(venta.total).toFixed(2)}`, 20, yPosition + 24);
        
        totalGeneral += parseFloat(venta.total);
        yPosition += 35;
      });
      
      doc.setFontSize(12);
      doc.setFont('helvetica', 'bold');
      doc.text(`TOTAL GENERAL: S/ ${totalGeneral.toFixed(2)}`, 20, yPosition + 10);
      
      const nombreArchivo = `Reporte_Ventas_${fechaInicio}_${fechaFin}.pdf`;
      doc.save(nombreArchivo);
      
      showSuccess('Reporte de ventas generado exitosamente');
    }
    
    async function descargarPDF(id) {
      try {
        const venta = ventas.find(v => v.id === id);
        if (!venta) {
          showError('Venta no encontrada');
          return;
        }
        
        const response = await fetch(`/api/ventas/${id}`);
        if (!response.ok) {
          throw new Error('Error al obtener los datos de la venta');
        }
        
        const ventaCompleta = await response.json();
        generarPDFVentaA4(ventaCompleta, true);
        
      } catch (error) {
        console.error('Error al descargar PDF:', error);
        showError('Error al generar el PDF');
      }
    }

    function debounce(func, wait) {
      let timeout;
      return function executedFunction(...args) {
        const later = () => {
          clearTimeout(timeout);
          func(...args);
        };
        clearTimeout(timeout);
        timeout = setTimeout(later, wait);
      };
    }

    function showSuccess(message) {
      Swal.fire({
        title: '¡Éxito!',
        text: message,
        icon: 'success',
        timer: 2000,
        showConfirmButton: false
      });
    }

    function showError(message) {
      Swal.fire({
        title: 'Error',
        text: message,
        icon: 'error'
      });
    }

    function showInfo(message) {
      Swal.fire({
        title: 'Información',
        html: message,
        icon: 'info'
      });
    }
  </script>
