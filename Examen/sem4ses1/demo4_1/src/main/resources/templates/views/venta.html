<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Ventas Veterinarias · VetCare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.12.4/dist/sweetalert2.min.css" rel="stylesheet">
  <link href="/css/global.css" rel="stylesheet">
  
    
  <style>
    :root {
      --sidebar-bg: linear-gradient(180deg, #84cddb, #b4dadf);
      --sidebar-hover: rgba(255, 255, 255, 0.15);
      --sidebar-active: linear-gradient(135deg, #4facfe, #00f2fe);
      --text-color: #ffffff;
    }
  
    /* Sidebar */
    .sidebar {
      position: fixed;
      inset-block: 0;
      inset-inline-start: 0;
      width: 260px;
      background: var(--sidebar-bg);
      color: var(--text-color);
      z-index: 1030;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      border-right: 3px solid rgba(255,255,255,0.1);
    }
  
    /* Logo */
    .brand-logo {
      width: 90%;
      border-radius: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      transition: transform .3s ease;
    }
    .brand-logo:hover {
      transform: scale(1.05);
    }
  
    /* Menú */
    .sidebar .nav-link {
      color: var(--text-color);
      border-radius: .6rem;
      padding: .65rem 1rem;
      display: flex;
      align-items: center;
      gap: .6rem;
      transition: all .2s;
      font-weight: 500;
    }
  
    .sidebar .nav-link:hover {
      background: var(--sidebar-hover);
    }
  
    .sidebar .nav-link.active {
      background: var(--sidebar-active);
      color: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
    }
  
    /* Footer */
    .sidebar-footer {
      padding: 1rem;
      font-size: .85rem;
      color: rgba(255,255,255,.8);
      border-top: 1px solid rgba(255,255,255,.2);
    }
  </style>
  
</head>
<body>
  
  <aside class="sidebar d-flex flex-column p-3">
    
    <div class="brand mb-4 text-center">
      <img src="https://marketplace.canva.com/EAGre3wkiKc/1/0/1600w/canva-logotipo-veterinaria-ilustrado-lindo-azul-aqua-beige-g5Mq7lvYdmg.jpg" 
           alt="VetCare Logo" 
           class="brand-logo">
    </div>
  
    
    <ul class="nav flex-column gap-1">
      <li><a href="/dashboard" class="nav-link"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
      <li><a href="/cliente" class="nav-link"><i class="bi bi-people me-2"></i>Clientes</a></li>
      <li><a href="/mascota" class="nav-link"><i class="bi bi-bag-heart me-2"></i>Mascotas</a></li>
      <li><a href="/cita" class="nav-link"><i class="bi bi-calendar2-week me-2"></i>Citas</a></li>
      <li><a href="/venta" class="nav-link"><i class="bi bi-receipt me-2"></i>Ventas</a></li>
      <li><a href="/producto" class="nav-link"><i class="bi bi-box-seam me-2"></i>Productos</a></li>
      <li><a href="/usuario" class="nav-link"><i class="bi bi-person-gear me-2"></i>Usuarios</a></li>
      <li><a href="/pago" class="nav-link"><i class="bi bi-cash-coin me-2"></i>Pagos</a></li>
      <li><a href="/servicio" class="nav-link"><i class="bi bi-scissors me-2"></i>Servicios</a></li>
    </ul>
  
    
    <div class="sidebar-footer mt-auto text-center small">
      © 2025 VetCare
    </div>
  </aside>
  

  
  <main class="content">
    <div class="topbar d-flex align-items-center justify-content-between">
      <div>
        <h5 class="mb-0"><i class="bi bi-cart me-2"></i>Gestión de Ventas</h5>
        <small class="text-muted">Administra las ventas y transacciones</small>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-outline-primary btn-sm" onclick="exportarVentas()">
          <i class="bi bi-download me-1"></i> Exportar
        </button>
        <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#ventaModal">
          <i class="bi bi-plus-lg me-1"></i> Nueva Venta
        </button>
      </div>
    </div>

    <div class="container-fluid py-4">
      
      <div class="card mb-4">
        <div class="card-body">
          <div class="row g-3">
            <div class="col-md-3">
              <label class="form-label">Buscar venta</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-search"></i></span>
                <input type="text" class="form-control" id="searchInput" placeholder="Cliente, producto, monto...">
              </div>
            </div>
            <div class="col-md-2">
              <label class="form-label">Estado</label>
              <select class="form-select" id="estadoFilter">
                <option value="">Todos</option>
                <option value="Pendiente">Pendiente</option>
                <option value="Completada">Completada</option>
                <option value="Cancelada">Cancelada</option>
              </select>
            </div>
            <div class="col-md-2">
              <label class="form-label">Fecha desde</label>
              <input type="date" class="form-control" id="fechaDesde">
            </div>
            <div class="col-md-2">
              <label class="form-label">Fecha hasta</label>
              <input type="date" class="form-control" id="fechaHasta">
            </div>
            <div class="col-md-2">
              <label class="form-label">Monto mínimo</label>
              <input type="number" class="form-control" id="montoMin" step="0.01" min="0">
            </div>
            <div class="col-md-1 d-flex align-items-end">
              <button class="btn btn-outline-secondary w-100" onclick="limpiarFiltros()">
                <i class="bi bi-arrow-clockwise"></i>
              </button>
            </div>
          </div>
        </div>
      </div>

      
      <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
          <h6 class="mb-0"><i class="bi bi-list-ul me-2"></i>Lista de Ventas</h6>
          <span class="badge bg-primary" id="totalVentas">0 ventas</span>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th width="5%">ID</th>
                  <th width="20%">Cliente</th>
                  <th width="15%">Productos</th>
                  <th width="15%">Total</th>
                  <th width="15%">Fecha</th>
                  <th width="10%">Estado</th>
                  <th width="10%">Usuario</th>
                  <th width="10%" class="text-center">Acciones</th>
                </tr>
              </thead>
              <tbody id="tbodyVentas">
                
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>

  
  <div class="modal fade" id="ventaModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered">
      <div class="modal-content">
        <form id="formVenta">
          <div class="modal-header bg-gradient text-white">
            <h5 class="modal-title">
              <i class="bi bi-cart me-2"></i>
              <span id="modalTitle">Nueva Venta</span>
            </h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Cliente <span class="text-danger">*</span></label>
                <select class="form-select" name="idCliente" id="idCliente" required>
                  <option value="">Seleccionar cliente</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label">Estado</label>
                <select class="form-select" name="estado" id="estado">
                  <option value="Pendiente">Pendiente</option>
                  <option value="Completada">Completada</option>
                  <option value="Cancelada">Cancelada</option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label">Productos</label>
                <div class="card">
                  <div class="card-body">
                    <div class="row g-2 mb-3">
                      <div class="col-md-4">
                        <select class="form-select" id="productoSelect">
                          <option value="">Seleccionar producto</option>
                        </select>
                      </div>
                      <div class="col-md-2">
                        <input type="number" class="form-control" id="cantidadInput" placeholder="Cantidad" min="1" value="1">
                      </div>
                      <div class="col-md-3">
                        <input type="number" class="form-control" id="precioInput" placeholder="Precio" step="0.01" min="0" readonly>
                      </div>
                      <div class="col-md-3">
                        <button type="button" class="btn btn-outline-primary w-100" onclick="agregarProducto()">
                          <i class="bi bi-plus"></i> Agregar
                        </button>
                      </div>
                    </div>
                    <div id="productosList" class="mb-3">
                      
                    </div>
                    <div class="d-flex justify-content-between align-items-center">
                      <strong>Total: S/ <span id="totalVenta">0.00</span></strong>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
              <i class="bi bi-x-lg me-1"></i> Cancelar
            </button>
            <button type="submit" class="btn btn-primary" id="btnGuardar">
              <i class="bi bi-check-lg me-1"></i> Guardar Venta
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.12.4/dist/sweetalert2.all.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="/js/utils.js"></script>
  <script>
    let ventas = [];
    let clientes = [];
    let productos = [];
    let ventaEditando = null;
    let productosVenta = [];

    document.addEventListener("DOMContentLoaded", function() {
      loadVentas();
      loadClientes();
      loadProductos();
      setupEventListeners();
    });

    function setupEventListeners() {
      document.getElementById('searchInput').addEventListener('input', debounce(filterVentas, 300));
      document.getElementById('estadoFilter').addEventListener('change', filterVentas);
      document.getElementById('fechaDesde').addEventListener('change', filterVentas);
      document.getElementById('fechaHasta').addEventListener('change', filterVentas);
      document.getElementById('montoMin').addEventListener('input', filterVentas);
      document.getElementById('formVenta').addEventListener('submit', handleSubmitVenta);
      document.getElementById('productoSelect').addEventListener('change', updatePrecio);
      document.getElementById('cantidadInput').addEventListener('input', updateSubtotal);
    }

    async function loadVentas() {
      try {
        const res = await fetch("/api/ventas");
        if (!res.ok) throw new Error('Error al cargar ventas');
        
        const data = await res.json();
        ventas = data;
        renderVentas();
      } catch (error) {
        console.error("Error:", error);
        showError("Error al cargar las ventas");
      }
    }

    async function loadClientes() {
      try {
        const res = await fetch("/api/clientes");
        if (!res.ok) throw new Error('Error al cargar clientes');
        
        const data = await res.json();
        clientes = data;
        populateClientesSelect();
      } catch (error) {
        console.error("Error:", error);
      }
    }

    async function loadProductos() {
      try {
        const res = await fetch("/api/productos");
        if (!res.ok) throw new Error('Error al cargar productos');
        
        const data = await res.json();
        productos = data;
        populateProductosSelect();
      } catch (error) {
        console.error("Error:", error);
      }
    }

    function populateClientesSelect() {
      const select = document.getElementById('idCliente');
      select.innerHTML = '<option value="">Seleccionar cliente</option>';
      
      // Buscar cliente público para ponerlo primero
      const clientePublico = clientes.find(c => c.nombre === 'Público en' && c.apellido === 'General');
      if (clientePublico) {
        const option = document.createElement('option');
        option.value = clientePublico.id;
        option.textContent = `${clientePublico.nombre} ${clientePublico.apellido}`;
        option.selected = true; // Seleccionar por defecto
        select.appendChild(option);
      }
      
      // Agregar el resto de clientes
      clientes.forEach(cliente => {
        if (!(cliente.nombre === 'Público en' && cliente.apellido === 'General')) {
          const option = document.createElement('option');
          option.value = cliente.id;
          option.textContent = `${cliente.nombre} ${cliente.apellido}`;
          select.appendChild(option);
        }
      });
    }

    function populateProductosSelect() {
      const select = document.getElementById('productoSelect');
      select.innerHTML = '<option value="">Seleccionar producto</option>';
      productos.forEach(producto => {
        if (producto.activo && producto.stock > 0) {
          const option = document.createElement('option');
          option.value = producto.id;
          option.textContent = `${producto.nombre} - S/ ${producto.precio} (Stock: ${producto.stock})`;
          option.dataset.precio = producto.precio;
          option.dataset.stock = producto.stock;
          select.appendChild(option);
        }
      });
    }

    function updatePrecio() {
      const productoId = document.getElementById('productoSelect').value;
      const precioInput = document.getElementById('precioInput');
      
      if (productoId) {
        const producto = productos.find(p => p.id == productoId);
        if (producto) {
          precioInput.value = producto.precio;
        }
      } else {
        precioInput.value = '';
      }
    }

    function updateSubtotal() {
      const cantidad = parseInt(document.getElementById('cantidadInput').value) || 0;
      const precio = parseFloat(document.getElementById('precioInput').value) || 0;
      const subtotal = cantidad * precio;
      // Aquí podrías mostrar el subtotal si quisieras
    }

    function agregarProducto() {
      const productoId = document.getElementById('productoSelect').value;
      const cantidad = parseInt(document.getElementById('cantidadInput').value) || 1;
      const precio = parseFloat(document.getElementById('precioInput').value) || 0;
      
      if (!productoId || cantidad <= 0 || precio <= 0) {
        showError('Por favor selecciona un producto válido');
        return;
      }

      const producto = productos.find(p => p.id == productoId);
      if (!producto) return;

      if (cantidad > producto.stock) {
        showError('No hay suficiente stock disponible');
        return;
      }

      // Verificar si el producto ya está en la lista
      const productoExistente = productosVenta.find(p => p.id === productoId);
      if (productoExistente) {
        productoExistente.cantidad += cantidad;
        productoExistente.subtotal = productoExistente.cantidad * productoExistente.precio;
      } else {
        productosVenta.push({
          id: productoId,
          nombre: producto.nombre,
          precio: precio,
          cantidad: cantidad,
          subtotal: cantidad * precio
        });
      }

      renderProductosList();
      updateTotal();
      limpiarProductoForm();
    }

    function renderProductosList() {
      const container = document.getElementById('productosList');
      
      if (productosVenta.length === 0) {
        container.innerHTML = '<p class="text-muted">No hay productos agregados</p>';
        return;
      }

      container.innerHTML = productosVenta.map((producto, index) => `
        <div class="d-flex justify-content-between align-items-center border-bottom py-2">
          <div>
            <strong>${producto.nombre}</strong><br>
            <small class="text-muted">Cantidad: ${producto.cantidad} x S/ ${producto.precio}</small>
          </div>
          <div class="d-flex align-items-center gap-2">
            <span class="fw-bold">S/ ${producto.subtotal.toFixed(2)}</span>
            <button type="button" class="btn btn-outline-danger btn-sm" onclick="removerProducto(${index})">
              <i class="bi bi-trash"></i>
            </button>
          </div>
        </div>
      `).join('');
    }

    function removerProducto(index) {
      productosVenta.splice(index, 1);
      renderProductosList();
      updateTotal();
    }

    function updateTotal() {
      const total = productosVenta.reduce((sum, producto) => sum + producto.subtotal, 0);
      document.getElementById('totalVenta').textContent = total.toFixed(2);
    }

    function limpiarProductoForm() {
      document.getElementById('productoSelect').value = '';
      document.getElementById('cantidadInput').value = '1';
      document.getElementById('precioInput').value = '';
    }

    function renderVentas() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const estadoFilter = document.getElementById('estadoFilter').value;
      const fechaDesde = document.getElementById('fechaDesde').value;
      const fechaHasta = document.getElementById('fechaHasta').value;
      const montoMin = parseFloat(document.getElementById('montoMin').value) || 0;
      
      let filteredVentas = ventas.filter(venta => {
        if (searchTerm) {
          const cliente = (venta.cliente || '').toLowerCase();
          const total = venta.total.toString();
          if (!cliente.includes(searchTerm) && !total.includes(searchTerm)) {
            return false;
          }
        }
        
        if (estadoFilter && venta.estado !== estadoFilter) {
          return false;
        }
        
        if (fechaDesde) {
          const fechaVenta = new Date(venta.fecha).toISOString().split('T')[0];
          if (fechaVenta < fechaDesde) {
            return false;
          }
        }
        
        if (fechaHasta) {
          const fechaVenta = new Date(venta.fecha).toISOString().split('T')[0];
          if (fechaVenta > fechaHasta) {
            return false;
          }
        }
        
        if (montoMin > 0 && venta.total < montoMin) {
          return false;
        }
        
        return true;
      });

      renderVentasTable(filteredVentas);
    }

    function renderVentasTable(ventas) {
      const tbody = document.getElementById("tbodyVentas");
      
      if (ventas.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="8" class="text-center py-4">
              <i class="bi bi-cart fs-1 text-muted"></i>
              <p class="text-muted mt-2">No se encontraron ventas</p>
            </td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = ventas.map(venta => `
        <tr>
          <td><span class="fw-semibold">#${venta.id}</span></td>
          <td>
            <div>
              <div class="fw-semibold">${venta.cliente || '-'}</div>
            </div>
          </td>
          <td>
            <span class="badge bg-info">${venta.productos || 'Sin productos'}</span>
          </td>
          <td><span class="fw-bold text-success">S/ ${venta.total}</span></td>
          <td>
            <div>
              <div class="fw-semibold">${new Date(venta.fecha).toLocaleDateString()}</div>
              <div class="small text-muted">${new Date(venta.fecha).toLocaleTimeString()}</div>
            </div>
          </td>
          <td><span class="badge ${getEstadoBadgeClass(venta.estado)}">${venta.estado}</span></td>
          <td><span class="text-muted">${venta.usuario || '-'}</span></td>
          <td class="text-center">
            <div class="btn-group btn-group-sm">
              <button class="btn btn-outline-primary" onclick="editarVenta(${venta.id})" title="Editar">
                <i class="bi bi-pencil"></i>
              </button>
              <button class="btn btn-outline-info" onclick="verDetalles(${venta.id})" title="Ver detalles">
                <i class="bi bi-eye"></i>
              </button>
              <button class="btn btn-outline-success" onclick="generarComprobante(${venta.id})" title="Generar Comprobante">
                <i class="bi bi-file-pdf"></i>
              </button>
              <button class="btn btn-outline-danger" onclick="eliminarVenta(${venta.id})" title="Eliminar">
                <i class="bi bi-trash"></i>
              </button>
            </div>
          </td>
        </tr>
      `).join('');

      document.getElementById('totalVentas').textContent = `${ventas.length} ventas`;
    }

    function getEstadoBadgeClass(estado) {
      switch(estado) {
        case 'Completada': return 'bg-success';
        case 'Pendiente': return 'bg-warning';
        case 'Cancelada': return 'bg-danger';
        default: return 'bg-secondary';
      }
    }

    function filterVentas() {
      renderVentas();
    }

    function limpiarFiltros() {
      document.getElementById('searchInput').value = '';
      document.getElementById('estadoFilter').value = '';
      document.getElementById('fechaDesde').value = '';
      document.getElementById('fechaHasta').value = '';
      document.getElementById('montoMin').value = '';
      renderVentas();
    }

    async function handleSubmitVenta(e) {
      e.preventDefault();
      
      if (productosVenta.length === 0) {
        showError('Debe agregar al menos un producto');
        return;
      }

      const formData = new FormData(e.target);
      const ventaData = {
        idCliente: parseInt(formData.get('idCliente')),
        estado: formData.get('estado'),
        total: productosVenta.reduce((sum, producto) => sum + producto.subtotal, 0),
        productos: productosVenta
      };
      
      try {
        const url = ventaEditando ? `/api/ventas/${ventaEditando}` : '/api/ventas';
        const method = ventaEditando ? 'PUT' : 'POST';
        
        const response = await fetch(url, {
          method: method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(ventaData)
        });

        if (!response.ok) throw new Error('Error al guardar venta');

        showSuccess(ventaEditando ? 'Venta actualizada correctamente' : 'Venta registrada correctamente');
        
        bootstrap.Modal.getInstance(document.getElementById('ventaModal')).hide();
        document.getElementById('formVenta').reset();
        productosVenta = [];
        renderProductosList();
        updateTotal();
        ventaEditando = null;
        document.getElementById('modalTitle').textContent = 'Nueva Venta';
        loadVentas();
        
      } catch (error) {
        console.error('Error:', error);
        showError('Error al guardar la venta');
      }
    }

    function editarVenta(id) {
      const venta = ventas.find(v => v.id === id);
      if (!venta) return;
      
      ventaEditando = id;
      document.getElementById('modalTitle').textContent = 'Editar Venta';
      
      document.getElementById('idCliente').value = venta.idCliente;
      document.getElementById('estado').value = venta.estado;
      
      new bootstrap.Modal(document.getElementById('ventaModal')).show();
    }

    function verDetalles(id) {
      const venta = ventas.find(v => v.id === id);
      if (!venta) return;
      
      showInfo(`
        <strong>Venta #${venta.id}</strong><br>
        <strong>Cliente:</strong> ${venta.cliente}<br>
        <strong>Total:</strong> S/ ${venta.total}<br>
        <strong>Estado:</strong> ${venta.estado}<br>
        <strong>Fecha:</strong> ${new Date(venta.fecha).toLocaleString()}<br>
        <strong>Usuario:</strong> ${venta.usuario || 'No asignado'}
      `);
    }

    // Función para generar comprobante de venta
    async function generarComprobante(id) {
      try {
        const venta = ventas.find(v => v.id === id);
        if (!venta) {
          showError('Venta no encontrada');
          return;
        }

        // Obtener detalles de la venta (esto dependería de tu API)
        const detalles = venta.detalles || [];
        
        // Generar el PDF
        VetCareUtils.generateSaleReceipt(venta, detalles);
        
        showSuccess('Comprobante generado exitosamente');
        
      } catch (error) {
        console.error('Error al generar comprobante:', error);
        showError('Error al generar el comprobante');
      }
    }

    async function eliminarVenta(id) {
      const venta = ventas.find(v => v.id === id);
      if (!venta) return;

      const result = await Swal.fire({
        title: '¿Estás seguro?',
        text: `Se eliminará la venta #${venta.id}`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#d33',
        cancelButtonColor: '#3085d6',
        confirmButtonText: 'Sí, eliminar',
        cancelButtonText: 'Cancelar'
      });

      if (result.isConfirmed) {
        try {
          const response = await fetch(`/api/ventas/${id}`, { method: 'DELETE' });
          if (!response.ok) throw new Error('Error al eliminar venta');

          showSuccess('Venta eliminada correctamente');
          loadVentas();
        } catch (error) {
          console.error('Error:', error);
          showError('Error al eliminar la venta');
        }
      }
    }

    function exportarVentas() {
      showInfo('Función de exportación en desarrollo');
    }

    function debounce(func, wait) {
      let timeout;
      return function executedFunction(...args) {
        const later = () => {
          clearTimeout(timeout);
          func(...args);
        };
        clearTimeout(timeout);
        timeout = setTimeout(later, wait);
      };
    }

    function showSuccess(message) {
      Swal.fire({
        title: '¡Éxito!',
        text: message,
        icon: 'success',
        timer: 2000,
        showConfirmButton: false
      });
    }

    function showError(message) {
      Swal.fire({
        title: 'Error',
        text: message,
        icon: 'error'
      });
    }

    function showInfo(message) {
      Swal.fire({
        title: 'Información',
        html: message,
        icon: 'info'
      });
    }
  </script>
</body>
</html>
