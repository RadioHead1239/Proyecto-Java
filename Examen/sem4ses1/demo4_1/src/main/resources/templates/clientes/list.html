<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/layout :: layout_head('Clientes')"></head>
<body th:replace="fragments/layout :: layout(~{::section}, 'Clientes')">
<section>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="h4 mb-0">Clientes</h2>
            <p class="text-muted">Gestiona la información de tus clientes frecuentes.</p>
        </div>
        <button class="btn btn-primary" data-modal-target="createClienteModal" data-bs-toggle="modal"
                data-bs-target="#createClienteModal">
            <i class="bi bi-plus-circle me-2"></i>Nuevo Cliente
        </button>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="card card-dashboard">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Correo</th>
                        <th>Teléfono</th>
                        <th>Dirección</th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${clientes}">
                        <td th:text="${item.nombre + ' ' + item.apellido}">Juan Pérez</td>
                        <td th:text="${item.correo}">correo@correo.com</td>
                        <td th:text="${item.telefono}">999999999</td>
                        <td th:text="${item.direccion}">Av. Siempre Viva</td>
                        <td class="text-end">
                            <button class="btn btn-outline-primary btn-sm me-2"
                                    data-bs-toggle="modal" data-bs-target="#editClienteModal"
                                    data-modal-target="editClienteModal"
                                    th:data-action="@{/clientes/{id}(id=${item.id})}"
                                    data-method="put"
                                    th:data-id="${item.id}"
                                    th:data-nombre="${item.nombre}"
                                    th:data-apellido="${item.apellido}"
                                    th:data-correo="${item.correo}"
                                    th:data-telefono="${item.telefono}"
                                    th:data-direccion="${item.direccion}">
                                <i class="bi bi-pencil-square"></i>
                            </button>
                            <form th:action="@{/clientes/{id}(id=${item.id})}" method="post" class="d-inline">
                                <input type="hidden" name="_method" value="delete">
                                <button class="btn btn-outline-danger btn-sm" type="submit"
                                        onclick="return confirm('¿Desea eliminar este cliente?');">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${clientes.isEmpty()}">
                        <td colspan="5" class="text-center text-muted">No hay clientes registrados</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</section>

<!-- Crear Cliente -->
<div class="modal fade" id="createClienteModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Nuevo Cliente</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form th:action="@{/clientes}" th:object="${cliente}" method="post">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input class="form-control" th:field="*{nombre}" data-field="nombre">
                        <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('nombre')}"
                             th:errors="*{nombre}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Apellido</label>
                        <input class="form-control" th:field="*{apellido}" data-field="apellido">
                        <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('apellido')}"
                             th:errors="*{apellido}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Correo</label>
                        <input class="form-control" th:field="*{correo}" data-field="correo">
                        <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('correo')}"
                             th:errors="*{correo}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Teléfono</label>
                        <input class="form-control" th:field="*{telefono}" data-field="telefono">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Dirección</label>
                        <input class="form-control" th:field="*{direccion}" data-field="direccion">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Editar Cliente -->
<div class="modal fade" id="editClienteModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Editar Cliente</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form th:action="${cliente.id} != null ? @{/clientes/{id}(id=${cliente.id})} : ''" th:object="${cliente}"
                  method="post">
                <input type="hidden" name="_method" value="put">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input class="form-control" th:field="*{nombre}" data-field="nombre">
                        <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('nombre')}"
                             th:errors="*{nombre}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Apellido</label>
                        <input class="form-control" th:field="*{apellido}" data-field="apellido">
                        <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('apellido')}"
                             th:errors="*{apellido}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Correo</label>
                        <input class="form-control" th:field="*{correo}" data-field="correo">
                        <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('correo')}"
                             th:errors="*{correo}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Teléfono</label>
                        <input class="form-control" th:field="*{telefono}" data-field="telefono">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Dirección</label>
                        <input class="form-control" th:field="*{direccion}" data-field="direccion">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Actualizar</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
