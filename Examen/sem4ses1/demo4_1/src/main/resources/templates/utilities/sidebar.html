<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sidebar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.12.4/dist/sweetalert2.min.css" rel="stylesheet">
  <link href="/css/global.css" rel="stylesheet">
</head>

<body>
  <div th:fragment="sidebar_holamundo">
    <aside class="sidebar d-flex flex-column p-3">
      <div class="brand mb-4">
        <div class="brand-icon"><i class="bi bi-scissors"></i></div>
        <div>
          <span class="fw-bold">VetCare</span><br>
          <small class="text-muted">Gestión</small>
        </div>
      </div>
    
      <ul class="nav flex-column gap-1">
        <li>
          <a href="/dashboard" class="nav-link d-flex align-items-center px-3 py-2">
            <i class="bi bi-speedometer2 me-2"></i> <span>Dashboard</span>
          </a>
        </li>
        <li>
          <a href="/cliente" class="nav-link d-flex align-items-center px-3 py-2">
            <i class="bi bi-people me-2"></i> <span>Clientes</span>
          </a>
        </li>
        <li>
          <a href="/mascota" class="nav-link d-flex align-items-center px-3 py-2">
            <i class="bi bi-bag-heart me-2"></i> <span>Mascotas</span>
          </a>
        </li>
        <li>
          <a href="/cita" class="nav-link d-flex align-items-center px-3 py-2">
            <i class="bi bi-calendar2-week me-2"></i> <span>Citas</span>
          </a>
        </li>
        <li>
          <a href="/venta" class="nav-link d-flex align-items-center px-3 py-2">
            <i class="bi bi-receipt me-2"></i> <span>Ventas</span>
          </a>
        </li>
        <li>
          <a href="/producto" class="nav-link d-flex align-items-center px-3 py-2">
            <i class="bi bi-box-seam me-2"></i> <span>Productos</span>
          </a>
        </li>
        <li>
          <a href="/usuario" class="nav-link d-flex align-items-center px-3 py-2">
            <i class="bi bi-person-gear me-2"></i> <span>Usuarios</span>
          </a>
        </li>
        <li>
          <a href="/pago" class="nav-link d-flex align-items-center px-3 py-2">
            <i class="bi bi-cash-coin me-2"></i> <span>Pagos</span>
          </a>
        </li>
        <li>
          <a href="/servicio" class="nav-link d-flex align-items-center px-3 py-2">
            <i class="bi bi-scissors me-2"></i> <span>Servicios</span>
          </a>
        </li>
      </ul>
    
      <div class="sidebar-footer mt-auto text-center small text-muted">
        © 2025 VetCare
      </div>
    </aside>
  </div>
 
</body>
</html>
