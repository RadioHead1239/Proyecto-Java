<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/layout :: layout_head('Servicios')"></head>
<body th:replace="fragments/layout :: layout(~{::section}, 'Servicios')">
<section>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="h4 mb-0">Servicios</h2>
            <p class="text-muted">Define los servicios disponibles en la peluquería.</p>
        </div>
        <button class="btn btn-primary" data-modal-target="createServicioModal" data-bs-toggle="modal"
                data-bs-target="#createServicioModal">
            <i class="bi bi-plus-circle me-2"></i>Nuevo Servicio
        </button>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="card card-dashboard">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Precio</th>
                        <th>Duración</th>
                        <th>Descripción</th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${servicios}">
                        <td th:text="${item.nombre}">Baño completo</td>
                        <td th:text="${#numbers.formatDecimal(item.precio, 1, 'COMMA', 2, 'POINT')}">50.00</td>
                        <td th:text="${item.duracionMinutos + ' min'}">60 min</td>
                        <td th:text="${item.descripcion}">Descripción</td>
                        <td class="text-end">
                            <button class="btn btn-outline-primary btn-sm me-2" data-bs-toggle="modal"
                                    data-bs-target="#editServicioModal" data-modal-target="editServicioModal"
                                    th:data-action="@{/servicios/{id}(id=${item.id})}"
                                    data-method="put"
                                    th:data-id="${item.id}"
                                    th:data-nombre="${item.nombre}"
                                    th:data-descripcion="${item.descripcion}"
                                    th:data-precio="${item.precio}"
                                    th:data-duracion="${item.duracionMinutos}">
                                <i class="bi bi-pencil-square"></i>
                            </button>
                            <form th:action="@{/servicios/{id}(id=${item.id})}" method="post" class="d-inline">
                                <input type="hidden" name="_method" value="delete">
                                <button class="btn btn-outline-danger btn-sm" type="submit"
                                        onclick="return confirm('¿Eliminar este servicio?');">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${servicios.isEmpty()}">
                        <td colspan="5" class="text-center text-muted">No hay servicios registrados</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</section>

<div class="modal fade" id="createServicioModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Nuevo Servicio</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form th:action="@{/servicios}" th:object="${servicio}" method="post">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input class="form-control" th:field="*{nombre}" data-field="nombre">
                        <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('nombre')}"
                             th:errors="*{nombre}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Precio</label>
                        <input type="number" step="0.1" min="0" class="form-control" th:field="*{precio}" data-field="precio">
                        <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('precio')}"
                             th:errors="*{precio}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Duración (minutos)</label>
                        <input type="number" min="1" class="form-control" th:field="*{duracionMinutos}" data-field="duracion">
                        <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('duracionMinutos')}"
                             th:errors="*{duracionMinutos}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea class="form-control" rows="3" th:field="*{descripcion}" data-field="descripcion"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="modal fade" id="editServicioModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Editar Servicio</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form th:action="${servicio.id} != null ? @{/servicios/{id}(id=${servicio.id})} : ''" th:object="${servicio}" method="post">
                <input type="hidden" name="_method" value="put">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input class="form-control" th:field="*{nombre}" data-field="nombre">
                        <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('nombre')}"
                             th:errors="*{nombre}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Precio</label>
                        <input type="number" step="0.1" min="0" class="form-control" th:field="*{precio}" data-field="precio">
                        <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('precio')}"
                             th:errors="*{precio}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Duración (minutos)</label>
                        <input type="number" min="1" class="form-control" th:field="*{duracionMinutos}" data-field="duracion">
                        <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('duracionMinutos')}"
                             th:errors="*{duracionMinutos}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea class="form-control" rows="3" th:field="*{descripcion}" data-field="descripcion"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Actualizar</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
