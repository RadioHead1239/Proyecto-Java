<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/layout :: layout_head('Productos')"></head>
<body th:replace="fragments/layout :: layout(~{::section}, 'Productos')">
<section>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="h4 mb-0">Productos</h2>
            <p class="text-muted">Administra los productos y accesorios disponibles para la venta.</p>
        </div>
        <button class="btn btn-primary" data-modal-target="createProductoModal" data-bs-toggle="modal"
                data-bs-target="#createProductoModal">
            <i class="bi bi-plus-circle me-2"></i>Nuevo Producto
        </button>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="card card-dashboard">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th>Descripción</th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${productos}">
                        <td th:text="${item.nombre}">Shampoo Premium</td>
                        <td th:text="${#numbers.formatDecimal(item.precio, 1, 'COMMA', 2, 'POINT')}">35.00</td>
                        <td th:text="${item.stock}">10</td>
                        <td th:text="${item.descripcion}">Descripción</td>
                        <td class="text-end">
                            <button class="btn btn-outline-primary btn-sm me-2" data-bs-toggle="modal"
                                    data-bs-target="#editProductoModal" data-modal-target="editProductoModal"
                                    th:data-action="@{/productos/{id}(id=${item.id})}" data-method="put"
                                    th:data-id="${item.id}"
                                    th:data-nombre="${item.nombre}"
                                    th:data-descripcion="${item.descripcion}"
                                    th:data-precio="${item.precio}"
                                    th:data-stock="${item.stock}">
                                <i class="bi bi-pencil-square"></i>
                            </button>
                            <form th:action="@{/productos/{id}(id=${item.id})}" method="post" class="d-inline">
                                <input type="hidden" name="_method" value="delete">
                                <button class="btn btn-outline-danger btn-sm" type="submit"
                                        onclick="return confirm('¿Eliminar este producto?');">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${productos.isEmpty()}">
                        <td colspan="5" class="text-center text-muted">No hay productos registrados</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</section>

<div class="modal fade" id="createProductoModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Nuevo Producto</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form th:action="@{/productos}" th:object="${producto}" method="post">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input class="form-control" th:field="*{nombre}" data-field="nombre">
                        <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('nombre')}"
                             th:errors="*{nombre}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Precio</label>
                        <input type="number" step="0.1" min="0" class="form-control" th:field="*{precio}" data-field="precio">
                        <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('precio')}"
                             th:errors="*{precio}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Stock</label>
                        <input type="number" min="0" class="form-control" th:field="*{stock}" data-field="stock">
                        <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('stock')}"
                             th:errors="*{stock}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea class="form-control" rows="3" th:field="*{descripcion}" data-field="descripcion"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="modal fade" id="editProductoModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Editar Producto</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form th:action="${producto.id} != null ? @{/productos/{id}(id=${producto.id})} : ''" th:object="${producto}"
                  method="post">
                <input type="hidden" name="_method" value="put">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input class="form-control" th:field="*{nombre}" data-field="nombre">
                        <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('nombre')}"
                             th:errors="*{nombre}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Precio</label>
                        <input type="number" step="0.1" min="0" class="form-control" th:field="*{precio}" data-field="precio">
                        <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('precio')}"
                             th:errors="*{precio}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Stock</label>
                        <input type="number" min="0" class="form-control" th:field="*{stock}" data-field="stock">
                        <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('stock')}"
                             th:errors="*{stock}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea class="form-control" rows="3" th:field="*{descripcion}" data-field="descripcion"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Actualizar</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
