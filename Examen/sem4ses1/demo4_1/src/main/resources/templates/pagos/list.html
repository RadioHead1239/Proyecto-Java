<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/layout :: layout_head('Pagos')"></head>
<body th:replace="fragments/layout :: layout(~{::section}, 'Pagos')">
<section>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="h4 mb-0">Pagos</h2>
            <p class="text-muted">Registra los pagos de los servicios realizados.</p>
        </div>
        <button class="btn btn-primary" data-modal-target="createPagoModal" data-bs-toggle="modal"
                data-bs-target="#createPagoModal">
            <i class="bi bi-plus-circle me-2"></i>Nuevo Pago
        </button>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="card card-dashboard">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                    <tr>
                        <th>Cita</th>
                        <th>Monto</th>
                        <th>Fecha</th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${pagos}">
                        <td>
                            <span class="fw-semibold" th:text="${item.cita.mascota.nombre}"></span>
                            <small class="text-muted d-block" th:text="${#temporals.format(item.cita.fechaCita, 'dd/MM HH:mm')}"></small>
                        </td>
                        <td th:text="${#numbers.formatDecimal(item.monto, 1, 'COMMA', 2, 'POINT')}">120.00</td>
                        <td th:text="${#temporals.format(item.fechaPago, 'dd/MM/yyyy HH:mm')}">05/05/2024</td>
                        <td class="text-end">
                            <button class="btn btn-outline-primary btn-sm me-2" data-bs-toggle="modal"
                                    data-bs-target="#editPagoModal" data-modal-target="editPagoModal"
                                    th:data-action="@{/pagos/{id}(id=${item.id})}" data-method="put"
                                    th:data-id="${item.id}"
                                    th:data-cita="${item.cita.id}"
                                    th:data-monto="${item.monto}">
                                <i class="bi bi-pencil-square"></i>
                            </button>
                            <form th:action="@{/pagos/{id}(id=${item.id})}" method="post" class="d-inline">
                                <input type="hidden" name="_method" value="delete">
                                <button class="btn btn-outline-danger btn-sm" type="submit"
                                        onclick="return confirm('¿Eliminar este pago?');">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${pagos.isEmpty()}">
                        <td colspan="4" class="text-center text-muted">No hay pagos registrados</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</section>

<div class="modal fade" id="createPagoModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Registrar Pago</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form th:action="@{/pagos}" th:object="${pago}" method="post">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Cita</label>
                        <select class="form-select" th:field="*{cita.id}" data-field="cita">
                            <option value="">Seleccione</option>
                            <option th:each="cit : ${citas}" th:value="${cit.id}" th:text="${cit.mascota.nombre + ' - ' + #temporals.format(cit.fechaCita, 'dd/MM HH:mm')}"></option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Monto</label>
                        <input type="number" step="0.1" min="0" class="form-control" th:field="*{monto}" data-field="monto">
                        <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('monto')}" th:errors="*{monto}"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="modal fade" id="editPagoModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Editar Pago</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form th:action="${pago.id} != null ? @{/pagos/{id}(id=${pago.id})} : ''" th:object="${pago}" method="post">
                <input type="hidden" name="_method" value="put">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Cita</label>
                        <select class="form-select" th:field="*{cita.id}" data-field="cita">
                            <option value="">Seleccione</option>
                            <option th:each="cit : ${citas}" th:value="${cit.id}" th:text="${cit.mascota.nombre + ' - ' + #temporals.format(cit.fechaCita, 'dd/MM HH:mm')}"></option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Monto</label>
                        <input type="number" step="0.1" min="0" class="form-control" th:field="*{monto}" data-field="monto">
                        <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('monto')}" th:errors="*{monto}"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Actualizar</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
