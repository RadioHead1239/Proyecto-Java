<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="layout_head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Peluquería Mascotas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body th:fragment="layout(content, title)" th:attr="data-open-modal=${modal}">
<nav class="sidebar bg-dark text-white">
    <div class="p-4">
        <div class="d-flex align-items-center mb-4">
            <i class="bi bi-scissors me-2 fs-3"></i>
            <span class="fs-5 fw-semibold">Peluquería Mascotas</span>
        </div>
        <ul class="nav nav-pills flex-column">
            <li class="nav-item"><a class="nav-link" th:classappend="${#httpServletRequest.requestURI=='/dashboard' ? ' active' : ''}" th:href="@{/dashboard}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/clientes}"><i class="bi bi-people me-2"></i>Clientes</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/mascotas}"><i class="bi bi-paw me-2"></i>Mascotas</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/servicios}"><i class="bi bi-stars me-2"></i>Servicios</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/citas}"><i class="bi bi-calendar-event me-2"></i>Citas</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/pagos}"><i class="bi bi-cash-coin me-2"></i>Pagos</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/productos}"><i class="bi bi-bag-heart me-2"></i>Productos</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/ventas}"><i class="bi bi-receipt me-2"></i>Ventas</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/usuarios}"><i class="bi bi-person-gear me-2"></i>Usuarios</a></li>
        </ul>
    </div>
</nav>
<div class="main-content">
    <header class="d-flex justify-content-between align-items-center border-bottom px-4 py-3 bg-white">
        <div>
            <h1 class="h4 mb-0" th:text="${title}">Dashboard</h1>
            <small class="text-muted">Bienvenido al panel de gestión de la peluquería</small>
        </div>
        <div>
            <a class="btn btn-outline-secondary" th:href="@{/logout}"><i class="bi bi-box-arrow-right me-2"></i>Salir</a>
        </div>
    </header>
    <main class="p-4" th:insert="${content}"></main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
